<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101935;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e2d4a" stroke-width="0.5"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background fill -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Accent glow circle top-right -->
  <circle cx="1050" cy="100" r="200" fill="#F59E0B" opacity="0.05"/>
  <circle cx="1050" cy="100" r="120" fill="#F59E0B" opacity="0.07"/>

  <!-- Bottom-left subtle glow -->
  <circle cx="150" cy="530" r="150" fill="#3B82F6" opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="80" y="68" width="60" height="4" fill="url(#accentGrad)" rx="2"/>

  <!-- ANKEN logo text -->
  <text x="80" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="900" letter-spacing="6" fill="white">ANKEN</text>

  <!-- Japanese subtitle -->
  <text x="83" y="286" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', sans-serif" font-size="26" font-weight="500" fill="#94A3B8" letter-spacing="2">アンケン</text>

  <!-- Separator line -->
  <rect x="80" y="318" width="500" height="1" fill="#1E2D4A"/>

  <!-- Main tagline -->
  <text x="80" y="378" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', sans-serif" font-size="34" font-weight="700" fill="white">その"ちょっとした"仕事、</text>
  <text x="80" y="426" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', sans-serif" font-size="34" font-weight="700" fill="white">要件定義からプロにお任せ。</text>

  <!-- Feature pills -->
  <rect x="80" y="468" width="148" height="38" rx="19" fill="#1E2D4A" stroke="#2D3F5E" stroke-width="1"/>
  <text x="154" y="492" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">無料業務コンサル</text>

  <rect x="242" y="468" width="130" height="38" rx="19" fill="#1E2D4A" stroke="#2D3F5E" stroke-width="1"/>
  <text x="307" y="492" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">AIマッチング</text>

  <rect x="386" y="468" width="152" height="38" rx="19" fill="#1E2D4A" stroke="#2D3F5E" stroke-width="1"/>
  <text x="462" y="492" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">業界最安手数料</text>

  <!-- Domain badge -->
  <rect x="80" y="540" width="248" height="36" rx="6" fill="#0F1F3D"/>
  <text x="204" y="563" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#64748B" text-anchor="middle">anken.bisii.co.jp</text>

  <!-- Right side decorative element - abstract network/match visual -->
  <!-- Nodes -->
  <circle cx="870" cy="220" r="8" fill="#F59E0B" opacity="0.9" filter="url(#glow)"/>
  <circle cx="980" cy="170" r="6" fill="#3B82F6" opacity="0.7"/>
  <circle cx="1050" cy="280" r="10" fill="#F59E0B" opacity="0.8" filter="url(#glow)"/>
  <circle cx="920" cy="350" r="6" fill="#10B981" opacity="0.7"/>
  <circle cx="1080" cy="380" r="7" fill="#3B82F6" opacity="0.6"/>
  <circle cx="960" cy="450" r="8" fill="#F59E0B" opacity="0.7"/>
  <circle cx="840" cy="400" r="5" fill="#10B981" opacity="0.5"/>
  <circle cx="1110" cy="240" r="5" fill="#10B981" opacity="0.6"/>

  <!-- Connecting lines -->
  <line x1="870" y1="220" x2="980" y2="170" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
  <line x1="870" y1="220" x2="1050" y2="280" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
  <line x1="980" y1="170" x2="1050" y2="280" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <line x1="980" y1="170" x2="1110" y2="240" stroke="#3B82F6" stroke-width="1" opacity="0.2"/>
  <line x1="1050" y1="280" x2="920" y2="350" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>
  <line x1="1050" y1="280" x2="1080" y2="380" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <line x1="920" y1="350" x2="960" y2="450" stroke="#10B981" stroke-width="1" opacity="0.3"/>
  <line x1="920" y1="350" x2="840" y2="400" stroke="#10B981" stroke-width="1" opacity="0.2"/>
  <line x1="1080" y1="380" x2="960" y2="450" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <line x1="1110" y1="240" x2="1080" y2="380" stroke="#3B82F6" stroke-width="1" opacity="0.2"/>

  <!-- AI label in center of network -->
  <circle cx="990" cy="310" r="36" fill="#0F1F3D" stroke="#F59E0B" stroke-width="1.5" opacity="0.9"/>
  <text x="990" y="303" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" text-anchor="middle">AI</text>
  <text x="990" y="320" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">マッチング</text>

  <!-- Bottom border accent -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accentGrad)" opacity="0.8"/>
</svg>
