<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <!-- 背景 -->
  <rect width="1200" height="480" fill="#F8FAFC" rx="12"/>

  <!-- タイトル -->
  <text x="600" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#1E293B">AI自動音声応答を中小企業に導入する3ステップ</text>

  <!-- ============ STEP 1 ============ -->
  <!-- カード背景 -->
  <rect x="60" y="80" width="320" height="340" fill="white" stroke="#DC2626" stroke-width="2" rx="12"/>
  <!-- ステップバッジ -->
  <rect x="60" y="65" width="80" height="30" fill="#DC2626" rx="6"/>
  <text x="100" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="white">STEP 1</text>
  <!-- アイコン: 虫眼鏡＋リスト -->
  <circle cx="220" cy="150" r="36" fill="#FEF2F2"/>
  <text x="220" y="160" text-anchor="middle" font-size="32">📋</text>
  <!-- 見出し -->
  <text x="220" y="215" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">業務棚卸し</text>
  <text x="220" y="237" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">シナリオ設計</text>
  <!-- 期間バッジ -->
  <rect x="148" y="253" width="144" height="24" fill="#FEF2F2" rx="12"/>
  <text x="220" y="269" text-anchor="middle" font-size="12" fill="#DC2626" font-weight="600">⏱ 1〜2週間</text>
  <!-- 説明テキスト -->
  <text x="220" y="304" text-anchor="middle" font-size="13" fill="#374151">1週間の着信を分類して</text>
  <text x="220" y="323" text-anchor="middle" font-size="13" fill="#374151">「用件パターン」を洗い出す</text>
  <text x="220" y="352" text-anchor="middle" font-size="13" fill="#374151">応答シナリオ（コールフロー）を</text>
  <text x="220" y="371" text-anchor="middle" font-size="13" fill="#374151">文書化する</text>

  <!-- ============ 矢印 1→2 ============ -->
  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="#059669"/>
    </marker>
  </defs>
  <line x1="390" y1="250" x2="430" y2="250" stroke="#059669" stroke-width="3" marker-end="url(#arr1)"/>
  <!-- 区切りラベル -->
  <rect x="391" y="224" width="38" height="20" fill="#F0FDF4" rx="4"/>
  <text x="410" y="238" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">次へ</text>

  <!-- ============ STEP 2 ============ -->
  <rect x="440" y="80" width="320" height="340" fill="white" stroke="#059669" stroke-width="2" rx="12"/>
  <rect x="440" y="65" width="80" height="30" fill="#059669" rx="6"/>
  <text x="480" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="white">STEP 2</text>
  <!-- アイコン: ギア -->
  <circle cx="600" cy="150" r="36" fill="#F0FDF4"/>
  <text x="600" y="160" text-anchor="middle" font-size="32">⚙️</text>
  <!-- 見出し -->
  <text x="600" y="215" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">スポット外注で</text>
  <text x="600" y="237" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">システム設定・構築</text>
  <!-- 期間バッジ -->
  <rect x="528" y="253" width="144" height="24" fill="#F0FDF4" rx="12"/>
  <text x="600" y="269" text-anchor="middle" font-size="12" fill="#059669" font-weight="600">⏱ 2〜4週間</text>
  <!-- 説明テキスト -->
  <text x="600" y="304" text-anchor="middle" font-size="13" fill="#374151">SaaS選定・契約・初期設定</text>
  <text x="600" y="323" text-anchor="middle" font-size="13" fill="#374151">シナリオ登録・転送先設定</text>
  <text x="600" y="352" text-anchor="middle" font-size="13" fill="#374151">CRM・Slack通知連携</text>
  <text x="600" y="371" text-anchor="middle" font-size="13" fill="#374151">テスト発信・動作確認</text>

  <!-- ============ 矢印 2→3 ============ -->
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 Z" fill="#059669"/>
    </marker>
  </defs>
  <line x1="770" y1="250" x2="810" y2="250" stroke="#059669" stroke-width="3" marker-end="url(#arr2)"/>
  <rect x="771" y="224" width="38" height="20" fill="#F0FDF4" rx="4"/>
  <text x="790" y="238" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">次へ</text>

  <!-- ============ STEP 3 ============ -->
  <rect x="820" y="80" width="320" height="340" fill="white" stroke="#1D4ED8" stroke-width="2" rx="12"/>
  <rect x="820" y="65" width="80" height="30" fill="#1D4ED8" rx="6"/>
  <text x="860" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="white">STEP 3</text>
  <!-- アイコン: サイクル -->
  <circle cx="980" cy="150" r="36" fill="#EFF6FF"/>
  <text x="980" y="160" text-anchor="middle" font-size="32">🔄</text>
  <!-- 見出し -->
  <text x="980" y="215" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">試験運用・</text>
  <text x="980" y="237" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B">改善サイクル</text>
  <!-- 期間バッジ -->
  <rect x="908" y="253" width="144" height="24" fill="#EFF6FF" rx="12"/>
  <text x="980" y="269" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="600">⏱ 1〜2か月</text>
  <!-- 説明テキスト -->
  <text x="980" y="304" text-anchor="middle" font-size="13" fill="#374151">実回線に接続して試験運用開始</text>
  <text x="980" y="323" text-anchor="middle" font-size="13" fill="#374151">誤認識・振り分けミスをログで確認</text>
  <text x="980" y="352" text-anchor="middle" font-size="13" fill="#374151">シナリオ改善・追加依頼を繰り返す</text>
  <text x="980" y="371" text-anchor="middle" font-size="13" fill="#374151">自走できる状態に育てる</text>

  <!-- ============ 費用目安バー ============ -->
  <rect x="60" y="445" width="320" height="24" fill="#FEF2F2" rx="6"/>
  <text x="220" y="462" text-anchor="middle" font-size="12" fill="#DC2626" font-weight="600">費用目安：無料〜5万円（内部作業）</text>
  <rect x="440" y="445" width="320" height="24" fill="#F0FDF4" rx="6"/>
  <text x="600" y="462" text-anchor="middle" font-size="12" fill="#059669" font-weight="600">費用目安：15〜40万円（スポット外注）</text>
  <rect x="820" y="445" width="320" height="24" fill="#EFF6FF" rx="6"/>
  <text x="980" y="462" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="600">費用目安：1〜5万円/件（追加改善）</text>
</svg>
