<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AIスキルの深さと副業単価</title>
  <desc id="desc">AIスキルレベルと副業時給目安の関係を示す図。左の使えるゾーンは時給2,000〜3,000円、右の作れるゾーンは時給4,500〜7,000円で、右上に向かう上昇曲線が描かれている。</desc>

  <defs>
    <style>
      .font {
        font-family: "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .title {
        fill: #0B1221;
        font-size: 30px;
        font-weight: 900;
      }
      .axis {
        stroke: #0B1221;
        stroke-width: 2.5;
        stroke-linecap: round;
      }
      .grid {
        stroke: #E5E7EB;
        stroke-width: 1;
      }
      .label {
        fill: #0B1221;
        font-size: 16px;
        font-weight: 700;
      }
      .small {
        fill: #475569;
        font-size: 13px;
        font-weight: 600;
      }
      .zoneTitle {
        fill: #0B1221;
        font-size: 20px;
        font-weight: 900;
      }
      .zoneRange {
        fill: #0B1221;
        font-size: 16px;
        font-weight: 700;
      }
      .tick {
        fill: #0B1221;
        font-size: 13px;
        font-weight: 700;
      }
      .curveLabel {
        fill: #F59E0B;
        font-size: 14px;
        font-weight: 800;
      }
    </style>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0B1221" flood-opacity="0.10"/>
    </filter>

    <marker id="arrowHead" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="600" y="54" text-anchor="middle" class="font title">AIスキルの深さと副業単価</text>

  <!-- Chart area definition -->
  <!-- left 140, right 1060, top 100, bottom 400 -->

  <!-- Zone backgrounds -->
  <rect x="140" y="100" width="420" height="300" rx="18" fill="#F3F4F6"/>
  <rect x="560" y="100" width="500" height="300" rx="18" fill="#FFF7ED"/>

  <!-- Grid -->
  <line x1="140" y1="100" x2="1060" y2="100" class="grid"/>
  <line x1="140" y1="175" x2="1060" y2="175" class="grid"/>
  <line x1="140" y1="250" x2="1060" y2="250" class="grid"/>
  <line x1="140" y1="325" x2="1060" y2="325" class="grid"/>
  <line x1="140" y1="400" x2="1060" y2="400" class="grid"/>

  <!-- Axes -->
  <line x1="140" y1="400" x2="1060" y2="400" class="axis"/>
  <line x1="140" y1="400" x2="140" y2="100" class="axis"/>

  <!-- Axis arrow tips -->
  <path d="M1052 394 L1060 400 L1052 406" fill="none" stroke="#0B1221" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M134 108 L140 100 L146 108" fill="none" stroke="#0B1221" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Y-axis labels -->
  <text x="112" y="405" text-anchor="end" class="font tick">低</text>
  <text x="112" y="105" text-anchor="end" class="font tick">高</text>
  <text x="80" y="250" transform="rotate(-90 80 250)" text-anchor="middle" class="font label">副業時給目安</text>

  <!-- X-axis labels -->
  <text x="600" y="455" text-anchor="middle" class="font label">AIスキルレベル</text>
  <text x="350" y="430" text-anchor="middle" class="font tick">使える</text>
  <text x="810" y="430" text-anchor="middle" class="font tick">作れる</text>

  <!-- Zone heading pills -->
  <g filter="url(#shadow)">
    <rect x="175" y="120" width="120" height="36" rx="18" fill="#FFFFFF"/>
    <text x="235" y="144" text-anchor="middle" class="font zoneTitle" font-size="18">使える</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="120" width="120" height="36" rx="18" fill="#FFFFFF"/>
    <text x="960" y="144" text-anchor="middle" class="font zoneTitle" font-size="18">作れる</text>
  </g>

  <!-- Range cards positioned away from curve -->
  <g filter="url(#shadow)">
    <rect x="175" y="165" width="190" height="70" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="270" y="193" text-anchor="middle" class="font small">副業時給の目安</text>
    <text x="270" y="221" text-anchor="middle" class="font zoneRange">2,000〜3,000円</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="165" width="200" height="70" rx="14" fill="#FFFFFF" stroke="#FDE68A"/>
    <text x="920" y="193" text-anchor="middle" class="font small">副業時給の目安</text>
    <text x="920" y="221" text-anchor="middle" class="font zoneRange">4,500〜7,000円</text>
  </g>

  <!-- Curve -->
  <path d="M220 340
           C310 332, 380 315, 455 285
           S620 225, 700 180
           S860 110, 970 95"
        fill="none"
        stroke="#F59E0B"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
        marker-end="url(#arrowHead)"/>

  <!-- Curve accent dots -->
  <circle cx="300" cy="327" r="6" fill="#F59E0B"/>
  <circle cx="500" cy="268" r="6" fill="#F59E0B"/>
  <circle cx="700" cy="180" r="6" fill="#F59E0B"/>
  <circle cx="905" cy="112" r="6" fill="#F59E0B"/>

  <!-- Curve helper label -->
  <g>
    <rect x="505" y="285" width="152" height="34" rx="17" fill="#0B1221"/>
    <text x="581" y="307" text-anchor="middle" class="font curveLabel" fill="#FFFFFF">スキルが深いほど上昇</text>
  </g>

  <!-- Subtle split line between zones -->
  <line x1="560" y1="100" x2="560" y2="400" stroke="#FFFFFF" stroke-width="3"/>

  <!-- Bottom zone captions -->
  <text x="350" y="378" text-anchor="middle" class="font small">既存AIツールを活用できる段階</text>
  <text x="810" y="378" text-anchor="middle" class="font small">AI機能を設計・実装できる段階</text>
</svg>
