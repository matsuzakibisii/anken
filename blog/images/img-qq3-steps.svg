<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" width="1200" height="480">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; }
    </style>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D6A4F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="#F5FBF7" rx="12"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="22" font-weight="700" fill="#1A2E25">スポット外注でシステム改修を依頼する3ステップ</text>

  <!-- Step 1 Card -->
  <rect x="40" y="90" width="320" height="330" rx="12" fill="white" stroke="#A7D9BD" stroke-width="2"/>
  <!-- Step number circle -->
  <circle cx="200" cy="130" r="28" fill="#2D6A4F"/>
  <text x="200" y="137" text-anchor="middle" font-size="20" font-weight="900" fill="white">1</text>
  <!-- Icon -->
  <text x="200" y="192" text-anchor="middle" font-size="38">📋</text>
  <!-- Step label -->
  <text x="200" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#1A2E25">改修タスクを整理する</text>
  <!-- Sub label -->
  <text x="200" y="264" text-anchor="middle" font-size="13" fill="#4B7A60">仕様をまとめて発注準備</text>
  <!-- Divider -->
  <line x1="68" y1="280" x2="332" y2="280" stroke="#E2F0E8" stroke-width="1"/>
  <!-- Detail list -->
  <text x="72" y="308" font-size="12" fill="#374151">・修正内容と期待する動作（Before/After）</text>
  <text x="72" y="330" font-size="12" fill="#374151">・エラーの再現手順・スクリーンショット</text>
  <text x="72" y="352" font-size="12" fill="#374151">・技術スタック（言語・FW・DB等）</text>
  <text x="72" y="374" font-size="12" fill="#374151">・テスト環境の有無と納期の希望</text>

  <!-- Arrow 1 -->
  <line x1="370" y1="255" x2="420" y2="255" stroke="#2D6A4F" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Step 2 Card -->
  <rect x="440" y="90" width="320" height="330" rx="12" fill="white" stroke="#A7D9BD" stroke-width="2"/>
  <circle cx="600" cy="130" r="28" fill="#2D6A4F"/>
  <text x="600" y="137" text-anchor="middle" font-size="20" font-weight="900" fill="white">2</text>
  <text x="600" y="192" text-anchor="middle" font-size="38">🔗</text>
  <text x="600" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#1A2E25">ANKENでエンジニアに発注</text>
  <text x="600" y="264" text-anchor="middle" font-size="13" fill="#4B7A60">タスク単位でスポット発注</text>
  <line x1="468" y1="280" x2="732" y2="280" stroke="#E2F0E8" stroke-width="1"/>
  <text x="472" y="308" font-size="12" fill="#374151">・使用技術・修正内容を共有する</text>
  <text x="472" y="330" font-size="12" fill="#374151">・最短即日〜3営業日でマッチング</text>
  <text x="472" y="352" font-size="12" fill="#374151">・エンジニアと詳細を確認・合意する</text>
  <text x="472" y="374" font-size="12" fill="#374151">・タスク単価で費用を確定する</text>

  <!-- Arrow 2 -->
  <line x1="770" y1="255" x2="820" y2="255" stroke="#2D6A4F" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Step 3 Card -->
  <rect x="840" y="90" width="320" height="330" rx="12" fill="white" stroke="#A7D9BD" stroke-width="2"/>
  <circle cx="1000" cy="130" r="28" fill="#2D6A4F"/>
  <text x="1000" y="137" text-anchor="middle" font-size="20" font-weight="900" fill="white">3</text>
  <text x="1000" y="192" text-anchor="middle" font-size="38">✅</text>
  <text x="1000" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#1A2E25">成果物確認・本番反映</text>
  <text x="1000" y="264" text-anchor="middle" font-size="13" fill="#4B7A60">テスト環境で確認してからリリース</text>
  <line x1="868" y1="280" x2="1132" y2="280" stroke="#E2F0E8" stroke-width="1"/>
  <text x="872" y="308" font-size="12" fill="#374151">・ステージング環境で動作確認</text>
  <text x="872" y="330" font-size="12" fill="#374151">・問題なければ本番環境に反映</text>
  <text x="872" y="352" font-size="12" fill="#374151">・承認後に費用を確定・支払い</text>
  <text x="872" y="374" font-size="12" fill="#374151">・必要に応じて次のタスクを依頼</text>

  <!-- Bottom note -->
  <rect x="40" y="440" width="1120" height="28" rx="6" fill="#D1FAE5"/>
  <text x="600" y="459" text-anchor="middle" font-size="12" font-weight="500" fill="#065F46">ANKENは成果物を確認・承認してから費用が確定します。ベンダー対応待ちなしに最短即日で対応開始できます。</text>
</svg>
