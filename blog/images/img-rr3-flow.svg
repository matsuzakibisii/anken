<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" width="1200" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&amp;display=swap');
      text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1D4ED8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FB923C"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="480" fill="#F8FAFF" rx="16"/>

  <!-- タイトル -->
  <text x="600" y="52" text-anchor="middle" font-size="22" font-weight="900" fill="#1D4ED8">スポット外注でFDEを活用する3ステップ</text>

  <!-- ===== STEP 1 ===== -->
  <!-- カード -->
  <rect x="40" y="90" width="310" height="290" rx="16" fill="white" stroke="#1D4ED8" stroke-width="2.5"/>
  <!-- ステップ番号ヘッダー -->
  <rect x="40" y="90" width="310" height="60" rx="16" fill="#1D4ED8"/>
  <rect x="40" y="130" width="310" height="20" fill="#1D4ED8"/>
  <text x="195" y="128" text-anchor="middle" font-size="15" font-weight="900" fill="white">STEP 1</text>

  <!-- アイコン：チェックリスト -->
  <rect x="165" y="165" width="60" height="72" rx="6" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
  <line x1="178" y1="182" x2="213" y2="182" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round"/>
  <line x1="178" y1="196" x2="213" y2="196" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round"/>
  <line x1="178" y1="210" x2="200" y2="210" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="175" cy="182" r="3" fill="#1D4ED8"/>
  <circle cx="175" cy="196" r="3" fill="#1D4ED8"/>
  <circle cx="175" cy="210" r="3" fill="#1D4ED8"/>

  <text x="195" y="260" text-anchor="middle" font-size="17" font-weight="900" fill="#1D4ED8">課題を言語化する</text>

  <text x="195" y="295" text-anchor="middle" font-size="13" fill="#374151">「今最も時間がかかっている</text>
  <text x="195" y="315" text-anchor="middle" font-size="13" fill="#374151">業務は何か」を一文で整理。</text>
  <text x="195" y="335" text-anchor="middle" font-size="13" fill="#374151">完璧な仕様書は不要。</text>
  <text x="195" y="355" text-anchor="middle" font-size="13" fill="#374151">粗い課題感でOK。</text>

  <!-- 矢印1 -->
  <line x1="360" y1="235" x2="420" y2="235" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="390" y="220" text-anchor="middle" font-size="11" fill="#6B7280">最短即日〜</text>
  <text x="390" y="255" text-anchor="middle" font-size="11" fill="#6B7280">3営業日</text>

  <!-- ===== STEP 2 ===== -->
  <rect x="430" y="90" width="310" height="290" rx="16" fill="white" stroke="#FB923C" stroke-width="2.5"/>
  <rect x="430" y="90" width="310" height="60" rx="16" fill="#FB923C"/>
  <rect x="430" y="130" width="310" height="20" fill="#FB923C"/>
  <text x="585" y="128" text-anchor="middle" font-size="15" font-weight="900" fill="white">STEP 2</text>

  <!-- アイコン：接続 -->
  <circle cx="565" cy="195" r="18" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="565" y="201" text-anchor="middle" font-size="18" fill="#FB923C">🔗</text>
  <line x1="590" y1="195" x2="600" y2="195" stroke="#FB923C" stroke-width="2" stroke-linecap="round"/>
  <circle cx="615" cy="195" r="18" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="615" y="201" text-anchor="middle" font-size="18" fill="#FB923C">👤</text>

  <text x="585" y="260" text-anchor="middle" font-size="17" font-weight="900" fill="#C2410C">ANKENでFDEに</text>
  <text x="585" y="280" text-anchor="middle" font-size="17" font-weight="900" fill="#C2410C">スポット発注する</text>

  <text x="585" y="310" text-anchor="middle" font-size="13" fill="#374151">課題・使用ツール・希望期間</text>
  <text x="585" y="330" text-anchor="middle" font-size="13" fill="#374151">を共有。ANKENが対応</text>
  <text x="585" y="350" text-anchor="middle" font-size="13" fill="#374151">可能なFDEをマッチング。</text>

  <!-- 矢印2 -->
  <line x1="750" y1="235" x2="810" y2="235" stroke="#FB923C" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="780" y="220" text-anchor="middle" font-size="11" fill="#6B7280">2週間〜</text>
  <text x="780" y="255" text-anchor="middle" font-size="11" fill="#6B7280">スタート</text>

  <!-- ===== STEP 3 ===== -->
  <rect x="820" y="90" width="340" height="290" rx="16" fill="white" stroke="#0F766E" stroke-width="2.5"/>
  <rect x="820" y="90" width="340" height="60" rx="16" fill="#0F766E"/>
  <rect x="820" y="130" width="340" height="20" fill="#0F766E"/>
  <text x="990" y="128" text-anchor="middle" font-size="15" font-weight="900" fill="white">STEP 3</text>

  <!-- アイコン：サイクル -->
  <path d="M970 165 A25 25 0 1 1 1010 165" stroke="#0F766E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="1010,155 1010,175 1025,165" fill="#0F766E"/>

  <text x="990" y="260" text-anchor="middle" font-size="17" font-weight="900" fill="#065F46">スポット稼働・成果確認</text>
  <text x="990" y="280" text-anchor="middle" font-size="17" font-weight="900" fill="#065F46">継続判断</text>

  <text x="990" y="310" text-anchor="middle" font-size="13" fill="#374151">週次で進捗確認しながら稼働。</text>
  <text x="990" y="330" text-anchor="middle" font-size="13" fill="#374151">期間終了後に成果物を確認し、</text>
  <text x="990" y="350" text-anchor="middle" font-size="13" fill="#374151">継続・次フェーズを判断。</text>

  <!-- 下部：費用ラベル -->
  <rect x="40" y="400" width="310" height="44" rx="10" fill="#EFF6FF"/>
  <text x="195" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">AIツール選定レポート</text>
  <text x="195" y="440" text-anchor="middle" font-size="12" fill="#1D4ED8">15〜40万円 / 1〜2週間</text>

  <rect x="430" y="400" width="310" height="44" rx="10" fill="#FFF7ED"/>
  <text x="585" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#C2410C">業務フロー AI組み込み</text>
  <text x="585" y="440" text-anchor="middle" font-size="12" fill="#C2410C">30〜80万円 / 2〜4週間</text>

  <rect x="820" y="400" width="340" height="44" rx="10" fill="#F0FDF9"/>
  <text x="990" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">研修・伴走支援</text>
  <text x="990" y="440" text-anchor="middle" font-size="12" fill="#065F46">20〜50万円 / 1〜3ヶ月</text>

</svg>
