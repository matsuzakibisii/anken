<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .ttl { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 25px; fill: #1E293B; }
      .num { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 15px; fill: #FFFFFF; }
      .name { font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 19px; fill: #1E293B; }
      .desc { font-family: 'Noto Sans JP', sans-serif; font-weight: 500; font-size: 13px; fill: #64748B; }
      .count { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 14px; fill: #DB2777; }
    </style>
  </defs>

  <rect width="1200" height="480" fill="#FFFBFC"/>
  <text x="50" y="48" class="ttl">プロンプト20選の4カテゴリ</text>

  <!-- Cell 1: top-left -->
  <g>
    <rect x="50" y="80" width="535" height="170" rx="16" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="2"/>
    <circle cx="105" cy="135" r="22" fill="#DB2777"/>
    <text x="105" y="141" text-anchor="middle" class="num">1</text>
    <path d="M145 122 h34 v20 h-34 z M145 122 l17 13 l17 -13" fill="none" stroke="#DB2777" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="145" y="178" class="name">クレーム対応メールの返信</text>
    <text x="145" y="202" class="desc">一次回答・返品案内・お詫び・解決報告など</text>
    <text x="535" y="202" text-anchor="end" class="count">5選</text>
  </g>

  <!-- Cell 2: top-right -->
  <g>
    <rect x="615" y="80" width="535" height="170" rx="16" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="2"/>
    <circle cx="670" cy="135" r="22" fill="#DB2777"/>
    <text x="670" y="141" text-anchor="middle" class="num">2</text>
    <path d="M710 122 l5 10 11 1.5 -8 7.5 2 11 -10 -5.5 -10 5.5 2 -11 -8 -7.5 11 -1.5 z" fill="#DB2777"/>
    <text x="710" y="178" class="name">口コミ・レビューへの返信</text>
    <text x="710" y="202" class="desc">星評価別の返信・多言語対応・傾向レポート</text>
    <text x="1100" y="202" text-anchor="end" class="count">5選</text>
  </g>

  <!-- Cell 3: bottom-left -->
  <g>
    <rect x="50" y="270" width="535" height="170" rx="16" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="2"/>
    <circle cx="105" cy="325" r="22" fill="#10B981"/>
    <text x="105" y="331" text-anchor="middle" class="num">3</text>
    <rect x="138" y="312" width="32" height="26" rx="3" fill="none" stroke="#10B981" stroke-width="2.2"/>
    <text x="154" y="332" text-anchor="middle" font-family="Noto Sans JP" font-weight="900" font-size="17" fill="#10B981">?</text>
    <text x="145" y="368" class="name">FAQ・ナレッジベースの作成</text>
    <text x="145" y="392" class="desc">起票・言い換え・抜け漏れチェック・要約版</text>
    <text x="535" y="392" text-anchor="end" class="count">5選</text>
  </g>

  <!-- Cell 4: bottom-right -->
  <g>
    <rect x="615" y="270" width="535" height="170" rx="16" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="2"/>
    <circle cx="670" cy="325" r="22" fill="#10B981"/>
    <text x="670" y="331" text-anchor="middle" class="num">4</text>
    <circle cx="703" cy="318" r="6.5" fill="none" stroke="#10B981" stroke-width="2.2"/>
    <circle cx="719" cy="318" r="6.5" fill="none" stroke="#10B981" stroke-width="2.2"/>
    <path d="M697 332 q6 -8 12 0 M713 332 q6 -8 12 0" fill="none" stroke="#10B981" stroke-width="2.2" stroke-linecap="round"/>
    <text x="710" y="368" class="name">社内エスカレーション・要約</text>
    <text x="710" y="392" class="desc">上司共有・引き継ぎ・週次レポート・マニュアル</text>
    <text x="1100" y="392" text-anchor="end" class="count">5選</text>
  </g>
</svg>
