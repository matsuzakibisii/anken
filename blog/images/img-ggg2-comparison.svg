<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <!-- Background -->
  <rect width="1200" height="500" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="48" font-size="22" font-weight="900" fill="#1e1e2e" text-anchor="middle">AI検索対応 前後の比較</text>

  <!-- Left column: Before -->
  <rect x="60" y="70" width="510" height="390" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="60" y="70" width="510" height="56" rx="16" fill="#BE185D"/>
  <rect x="60" y="108" width="510" height="18" rx="0" fill="#BE185D"/>
  <text x="315" y="105" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">対応前</text>

  <!-- Before rows -->
  <rect x="80" y="146" width="470" height="62" rx="10" fill="#fdf2f8"/>
  <text x="120" y="168" font-size="13" font-weight="700" fill="#BE185D">情報の状態</text>
  <text x="120" y="190" font-size="13" fill="#374151">各ページに長い説明文がある。問いに対する直接回答なし。</text>

  <rect x="80" y="218" width="470" height="62" rx="10" fill="#fdf2f8"/>
  <text x="120" y="240" font-size="13" font-weight="700" fill="#BE185D">AI引用率</text>
  <text x="120" y="262" font-size="13" fill="#374151">競合他社のページが優先的に引用される。自社は0〜低引用。</text>

  <rect x="80" y="290" width="470" height="62" rx="10" fill="#fdf2f8"/>
  <text x="120" y="312" font-size="13" font-weight="700" fill="#BE185D">技術実装</text>
  <text x="120" y="334" font-size="13" fill="#374151">構造化データなし。llms.txtなし。AIクローラー設定未確認。</text>

  <rect x="80" y="362" width="470" height="62" rx="10" fill="#fdf2f8"/>
  <text x="120" y="384" font-size="13" font-weight="700" fill="#BE185D">ビジネスへの影響</text>
  <text x="120" y="406" font-size="13" fill="#374151">ゼロクリック損失が拡大。競合に問い合わせが流れる。</text>

  <!-- Arrow in center -->
  <text x="600" y="295" font-size="36" fill="#6b7280" text-anchor="middle">→</text>

  <!-- Right column: After -->
  <rect x="630" y="70" width="510" height="390" rx="16" fill="#fff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="630" y="70" width="510" height="56" rx="16" fill="#0891B2"/>
  <rect x="630" y="108" width="510" height="18" rx="0" fill="#0891B2"/>
  <text x="885" y="105" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">対応後（3ステップ完了）</text>

  <!-- After rows -->
  <rect x="650" y="146" width="470" height="62" rx="10" fill="#ecfeff"/>
  <text x="690" y="168" font-size="13" font-weight="700" fill="#0891B2">情報の状態</text>
  <text x="690" y="190" font-size="13" fill="#374151">問い×直接回答・FAQ・定義ブロック・数値入り事例が整備済み。</text>

  <rect x="650" y="218" width="470" height="62" rx="10" fill="#ecfeff"/>
  <text x="690" y="240" font-size="13" font-weight="700" fill="#0891B2">AI引用率</text>
  <text x="690" y="262" font-size="13" fill="#374151">自社の定義・実績・FAQがAI Overviews・ChatGPTで引用される。</text>

  <rect x="650" y="290" width="470" height="62" rx="10" fill="#ecfeff"/>
  <text x="690" y="312" font-size="13" font-weight="700" fill="#0891B2">技術実装</text>
  <text x="690" y="334" font-size="13" fill="#374151">FAQPage/HowTo JSON-LD・llms.txt設置・AIクローラー許可済み。</text>

  <rect x="650" y="362" width="470" height="62" rx="10" fill="#ecfeff"/>
  <text x="690" y="384" font-size="13" font-weight="700" fill="#0891B2">ビジネスへの影響</text>
  <text x="690" y="406" font-size="13" fill="#374151">AI経由の認知拡大・ブランド名の引用増加・問い合わせ数向上。</text>

  <!-- Caption -->
  <text x="600" y="480" font-size="12" fill="#9ca3af" text-anchor="middle">※ AI引用率は自社コンテンツの整備状況・競合状況により異なります</text>
</svg>
