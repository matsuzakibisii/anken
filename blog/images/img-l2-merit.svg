<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"><rect width="1200" height="630" fill="#0f1f3d"/><text x="600" y="50" font-family="sans-serif" font-size="24" fill="#e2e8f0" text-anchor="middle" font-weight="bold">メガベンチャーエンジニアが副業を始める理由</text><rect x="40" y="90" width="350" height="470" rx="20" fill="#1d4ed8"/><text x="215" y="200" font-family="sans-serif" font-size="80" fill="#fff" text-anchor="middle" font-weight="normal">📈</text><text x="215" y="300" font-family="sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">市場価値アップ</text><rect x="65" y="330" width="300" height="130" rx="10" fill="rgba(0,0,0,0.25)"/><text x="215" y="373" font-family="sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="normal">本業外での実績が</text><text x="215" y="403" font-family="sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="normal">転職・独立の武器に</text><rect x="430" y="90" width="350" height="470" rx="20" fill="#7c3aed"/><text x="605" y="200" font-family="sans-serif" font-size="80" fill="#fff" text-anchor="middle" font-weight="normal">🌐</text><text x="605" y="300" font-family="sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">人脈ネットワーク</text><rect x="455" y="330" width="300" height="130" rx="10" fill="rgba(0,0,0,0.25)"/><text x="605" y="373" font-family="sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="normal">スタートアップとの</text><text x="605" y="403" font-family="sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="normal">繋がりが広がる</text><rect x="820" y="90" width="350" height="470" rx="20" fill="#059669"/><text x="995" y="200" font-family="sans-serif" font-size="80" fill="#fff" text-anchor="middle" font-weight="normal">💴</text><text x="995" y="300" font-family="sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">副収入獲得</text><rect x="845" y="330" width="300" height="130" rx="10" fill="rgba(0,0,0,0.25)"/><text x="995" y="373" font-family="sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="normal">週末稼働だけで</text><text x="995" y="403" font-family="sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="normal">月数万〜十数万円</text></svg>