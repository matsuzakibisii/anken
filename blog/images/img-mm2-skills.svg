<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" style="background:#F0FDF4;">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&amp;display=swap');
      text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- タイトル -->
  <text x="600" y="58" text-anchor="middle" font-size="28" font-weight="900" fill="#1F2937">FDE副業で評価されるスキルセットの3つの柱</text>

  <!-- ラベル 柱 -->
  <text x="600" y="90" text-anchor="middle" font-size="15" fill="#6B7280">「技術実装 × 業務理解 × 推進力」の掛け合わせが高単価につながる</text>

  <!-- カード背景 1 -->
  <rect x="60" y="115" width="330" height="330" rx="16" ry="16" fill="#FFFFFF" stroke="#10B981" stroke-width="3"/>
  <!-- カード1アクセント帯 -->
  <rect x="60" y="115" width="330" height="8" rx="4" ry="4" fill="#10B981"/>

  <!-- カード背景 2 -->
  <rect x="435" y="115" width="330" height="330" rx="16" ry="16" fill="#FFFFFF" stroke="#10B981" stroke-width="3"/>
  <rect x="435" y="115" width="330" height="8" rx="4" ry="4" fill="#10B981"/>

  <!-- カード背景 3 -->
  <rect x="810" y="115" width="330" height="330" rx="16" ry="16" fill="#FFFFFF" stroke="#10B981" stroke-width="3"/>
  <rect x="810" y="115" width="330" height="8" rx="4" ry="4" fill="#10B981"/>

  <!-- Card 1: AI技術実装力 -->
  <!-- アイコン（コードブラケット） -->
  <circle cx="225" cy="190" r="42" fill="#D1FAE5"/>
  <text x="225" y="200" text-anchor="middle" font-size="32" fill="#065F46">⚙️</text>

  <text x="225" y="262" text-anchor="middle" font-size="20" font-weight="900" fill="#1F2937">柱① AI技術実装力</text>

  <line x1="100" y1="276" x2="350" y2="276" stroke="#D1FAE5" stroke-width="2"/>

  <text x="225" y="305" text-anchor="middle" font-size="14" fill="#374151">LLM API連携</text>
  <text x="225" y="328" text-anchor="middle" font-size="14" fill="#374151">RAG / ベクトルDB構築</text>
  <text x="225" y="351" text-anchor="middle" font-size="14" fill="#374151">プロンプトエンジニアリング</text>
  <text x="225" y="374" text-anchor="middle" font-size="14" fill="#374151">Agentフレームワーク活用</text>

  <!-- 単価バッジ -->
  <rect x="130" y="398" width="190" height="32" rx="16" ry="16" fill="#10B981"/>
  <text x="225" y="419" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">時給 3,000〜5,000円</text>

  <!-- Card 2: 業務フロー理解力 -->
  <circle cx="600" cy="190" r="42" fill="#D1FAE5"/>
  <text x="600" y="200" text-anchor="middle" font-size="32" fill="#065F46">🔗</text>

  <text x="600" y="262" text-anchor="middle" font-size="20" font-weight="900" fill="#1F2937">柱② 業務フロー理解力</text>

  <line x1="475" y1="276" x2="725" y2="276" stroke="#D1FAE5" stroke-width="2"/>

  <text x="600" y="305" text-anchor="middle" font-size="14" fill="#374151">業務課題のヒアリング・整理</text>
  <text x="600" y="328" text-anchor="middle" font-size="14" fill="#374151">非エンジニアとの要件定義</text>
  <text x="600" y="351" text-anchor="middle" font-size="14" fill="#374151">AIを組み込む箇所の特定</text>
  <text x="600" y="374" text-anchor="middle" font-size="14" fill="#374151">業務担当者への説明・展開</text>

  <rect x="505" y="398" width="190" height="32" rx="16" ry="16" fill="#10B981"/>
  <text x="600" y="419" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">時給 4,000〜6,000円</text>

  <!-- Card 3: スモールスタート推進力 -->
  <circle cx="975" cy="190" r="42" fill="#D1FAE5"/>
  <text x="975" y="200" text-anchor="middle" font-size="32" fill="#065F46">🚀</text>

  <text x="975" y="262" text-anchor="middle" font-size="20" font-weight="900" fill="#1F2937">柱③ 推進力</text>

  <line x1="850" y1="276" x2="1100" y2="276" stroke="#D1FAE5" stroke-width="2"/>

  <text x="975" y="305" text-anchor="middle" font-size="14" fill="#374151">週末POCの設計・実装・検証</text>
  <text x="975" y="328" text-anchor="middle" font-size="14" fill="#374151">「まず動くもの」を最速で提供</text>
  <text x="975" y="351" text-anchor="middle" font-size="14" fill="#374151">フィードバックを踏まえた改善</text>
  <text x="975" y="374" text-anchor="middle" font-size="14" fill="#374151">成果物の引き渡し・ドキュメント</text>

  <rect x="880" y="398" width="190" height="32" rx="16" ry="16" fill="#F59E0B"/>
  <text x="975" y="419" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">時給 5,000〜8,000円</text>

  <!-- 注釈 -->
  <text x="600" y="478" text-anchor="middle" font-size="12" fill="#9CA3AF">※ 単価はANKENでの傾向値。案件規模・スキル組み合わせによって変動します。</text>
</svg>
