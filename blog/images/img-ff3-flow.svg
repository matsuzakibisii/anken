<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <rect x="0" y="0" width="1200" height="480" fill="#FFFBF7"/>

  <!-- Title -->
  <text x="600" y="48" font-size="24" font-weight="900" fill="#2A2420" text-anchor="middle">AI-OCR導入の3ステップ（イメージ）</text>

  <!-- Arrows -->
  <g stroke="#D9A0AE" stroke-width="3" fill="none">
    <line x1="368" y1="270" x2="418" y2="270"/>
    <polygon points="418,260 438,270 418,280" fill="#D9A0AE" stroke="none"/>
    <line x1="768" y1="270" x2="818" y2="270"/>
    <polygon points="818,260 838,270 818,280" fill="#D9A0AE" stroke="none"/>
  </g>

  <!-- STEP 1 -->
  <g>
    <rect x="60" y="120" width="300" height="300" rx="16" fill="#FFFFFF" stroke="#EDE0E3" stroke-width="2"/>
    <circle cx="210" cy="190" r="42" fill="#F7E1E8"/>
    <!-- document icon -->
    <g transform="translate(186,166)">
      <rect x="0" y="0" width="36" height="48" rx="3" fill="none" stroke="#B33C5D" stroke-width="3"/>
      <line x1="8" y1="14" x2="28" y2="14" stroke="#B33C5D" stroke-width="3"/>
      <line x1="8" y1="24" x2="28" y2="24" stroke="#B33C5D" stroke-width="3"/>
      <line x1="8" y1="34" x2="20" y2="34" stroke="#B33C5D" stroke-width="3"/>
    </g>
    <text x="210" y="262" font-size="14" font-weight="700" fill="#B33C5D" text-anchor="middle">STEP 1</text>
    <text x="210" y="292" font-size="18" font-weight="900" fill="#2A2420" text-anchor="middle">対象書類・項目</text>
    <text x="210" y="316" font-size="18" font-weight="900" fill="#2A2420" text-anchor="middle">を決める</text>
    <text x="210" y="348" font-size="13" fill="#78716C" text-anchor="middle">書類サンプルを集め</text>
    <text x="210" y="368" font-size="13" fill="#78716C" text-anchor="middle">読み取り項目を整理</text>
  </g>

  <!-- STEP 2 -->
  <g>
    <rect x="450" y="120" width="300" height="300" rx="16" fill="#FFFFFF" stroke="#EDE0E3" stroke-width="2"/>
    <circle cx="600" cy="190" r="42" fill="#F7E1E8"/>
    <!-- magnifier/test icon -->
    <g transform="translate(578,168)">
      <circle cx="14" cy="14" r="14" fill="none" stroke="#B33C5D" stroke-width="3"/>
      <line x1="24" y1="24" x2="36" y2="36" stroke="#B33C5D" stroke-width="3" stroke-linecap="round"/>
      <line x1="8" y1="14" x2="20" y2="14" stroke="#B33C5D" stroke-width="2"/>
    </g>
    <text x="600" y="262" font-size="14" font-weight="700" fill="#B33C5D" text-anchor="middle">STEP 2</text>
    <text x="600" y="292" font-size="18" font-weight="900" fill="#2A2420" text-anchor="middle">AI-OCRツールで</text>
    <text x="600" y="316" font-size="18" font-weight="900" fill="#2A2420" text-anchor="middle">テスト運用</text>
    <text x="600" y="348" font-size="13" fill="#78716C" text-anchor="middle">実際の書類で精度を確認し</text>
    <text x="600" y="368" font-size="13" fill="#78716C" text-anchor="middle">項目設定を調整</text>
  </g>

  <!-- STEP 3 -->
  <g>
    <rect x="840" y="120" width="300" height="300" rx="16" fill="#FFFFFF" stroke="#EDE0E3" stroke-width="2"/>
    <circle cx="990" cy="190" r="42" fill="#F7E1E8"/>
    <!-- link/connect icon -->
    <g transform="translate(966,172)">
      <rect x="0" y="8" width="20" height="20" rx="8" fill="none" stroke="#B33C5D" stroke-width="3"/>
      <rect x="28" y="8" width="20" height="20" rx="8" fill="none" stroke="#B33C5D" stroke-width="3"/>
      <line x1="20" y1="18" x2="28" y2="18" stroke="#B33C5D" stroke-width="3"/>
    </g>
    <text x="990" y="262" font-size="14" font-weight="700" fill="#B33C5D" text-anchor="middle">STEP 3</text>
    <text x="990" y="292" font-size="18" font-weight="900" fill="#2A2420" text-anchor="middle">既存システムと</text>
    <text x="990" y="316" font-size="18" font-weight="900" fill="#2A2420" text-anchor="middle">連携・本稼働</text>
    <text x="990" y="348" font-size="13" fill="#78716C" text-anchor="middle">出力先を設定し</text>
    <text x="990" y="368" font-size="13" fill="#78716C" text-anchor="middle">チェック体制を整えて運用開始</text>
  </g>

  <text x="600" y="450" font-size="13" fill="#A8A29E" text-anchor="middle">※企業規模・書類フォーマットにより導入期間は異なります</text>
</svg>
