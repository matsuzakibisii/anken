<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" width="1200" height="480">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="480" fill="#FAFAFA" rx="12"/>

  <!-- タイトル -->
  <text x="600" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#0B1221">業務種別ごとのAI活用パターンと導入難易度</text>

  <!-- カード1: メール -->
  <rect x="40" y="70" width="260" height="340" fill="#FFFFFF" rx="12" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- アイコン背景 -->
  <circle cx="170" cy="128" r="36" fill="#FEF3C7"/>
  <!-- メールアイコン -->
  <rect x="148" y="113" width="44" height="30" fill="none" stroke="#F59E0B" stroke-width="2.5" rx="3"/>
  <polyline points="148,113 170,131 192,113" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <!-- タイトル -->
  <text x="170" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#0B1221">メール作成・返信</text>
  <!-- 難易度 -->
  <rect x="115" y="198" width="110" height="22" fill="#D1FAE5" rx="11"/>
  <text x="170" y="213" text-anchor="middle" font-size="12" fill="#065F46" font-weight="700">★ 導入難易度：低</text>
  <!-- 説明 -->
  <text x="170" y="248" text-anchor="middle" font-size="12" fill="#555">推奨ツール</text>
  <text x="170" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1221">ChatGPT / Claude</text>
  <line x1="80" y1="282" x2="260" y2="282" stroke="#F0F0F0" stroke-width="1"/>
  <text x="170" y="305" text-anchor="middle" font-size="12" fill="#555">効果が出やすい業務</text>
  <text x="170" y="323" text-anchor="middle" font-size="12" fill="#444">社外メール・問い合わせ返信</text>
  <text x="170" y="341" text-anchor="middle" font-size="12" fill="#444">クレーム対応文・お礼状</text>
  <text x="170" y="359" text-anchor="middle" font-size="12" fill="#444">営業・アポ取りメール</text>
  <!-- 削減時間 -->
  <rect x="80" y="380" width="180" height="22" fill="#FEF3C7" rx="4"/>
  <text x="170" y="395" text-anchor="middle" font-size="12" fill="#92400E" font-weight="700">平均削減：15分 → 2〜3分</text>

  <!-- カード2: 議事録 -->
  <rect x="320" y="70" width="260" height="340" fill="#FFFFFF" rx="12" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- アイコン背景 -->
  <circle cx="450" cy="128" r="36" fill="#FEF3C7"/>
  <!-- 議事録アイコン（メモ帳） -->
  <rect x="430" y="108" width="40" height="44" fill="none" stroke="#F59E0B" stroke-width="2.5" rx="2"/>
  <line x1="436" y1="120" x2="464" y2="120" stroke="#F59E0B" stroke-width="2"/>
  <line x1="436" y1="130" x2="464" y2="130" stroke="#F59E0B" stroke-width="2"/>
  <line x1="436" y1="140" x2="455" y2="140" stroke="#F59E0B" stroke-width="2"/>
  <!-- タイトル -->
  <text x="450" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#0B1221">議事録作成</text>
  <!-- 難易度 -->
  <rect x="395" y="198" width="110" height="22" fill="#D1FAE5" rx="11"/>
  <text x="450" y="213" text-anchor="middle" font-size="12" fill="#065F46" font-weight="700">★ 導入難易度：低</text>
  <!-- 説明 -->
  <text x="450" y="248" text-anchor="middle" font-size="12" fill="#555">推奨ツール</text>
  <text x="450" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1221">Claude / ChatGPT</text>
  <line x1="360" y1="282" x2="540" y2="282" stroke="#F0F0F0" stroke-width="1"/>
  <text x="450" y="305" text-anchor="middle" font-size="12" fill="#555">効果が出やすい業務</text>
  <text x="450" y="323" text-anchor="middle" font-size="12" fill="#444">定例会議・MTG録音の整形</text>
  <text x="450" y="341" text-anchor="middle" font-size="12" fill="#444">アクション項目の抽出</text>
  <text x="450" y="359" text-anchor="middle" font-size="12" fill="#444">決定事項・課題の箇条書き化</text>
  <!-- 削減時間 -->
  <rect x="360" y="380" width="180" height="22" fill="#FEF3C7" rx="4"/>
  <text x="450" y="395" text-anchor="middle" font-size="12" fill="#92400E" font-weight="700">平均削減：45分 → 5〜10分</text>

  <!-- カード3: 報告書 -->
  <rect x="600" y="70" width="260" height="340" fill="#FFFFFF" rx="12" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- アイコン背景 -->
  <circle cx="730" cy="128" r="36" fill="#FEF3C7"/>
  <!-- 報告書アイコン（グラフ） -->
  <rect x="710" y="112" width="40" height="36" fill="none" stroke="#F59E0B" stroke-width="2" rx="2"/>
  <rect x="716" y="126" width="8" height="16" fill="#F59E0B" rx="1"/>
  <rect x="726" y="120" width="8" height="22" fill="#F59E0B" rx="1"/>
  <rect x="736" y="130" width="8" height="12" fill="#F59E0B" rx="1"/>
  <!-- タイトル -->
  <text x="730" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#0B1221">報告書・提案資料</text>
  <!-- 難易度 -->
  <rect x="675" y="198" width="110" height="22" fill="#FEF9C3" rx="11"/>
  <text x="730" y="213" text-anchor="middle" font-size="12" fill="#854D0E" font-weight="700">★★ 導入難易度：中</text>
  <!-- 説明 -->
  <text x="730" y="248" text-anchor="middle" font-size="12" fill="#555">推奨ツール</text>
  <text x="730" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1221">Claude（長文処理が得意）</text>
  <line x1="640" y1="282" x2="820" y2="282" stroke="#F0F0F0" stroke-width="1"/>
  <text x="730" y="305" text-anchor="middle" font-size="12" fill="#555">効果が出やすい業務</text>
  <text x="730" y="323" text-anchor="middle" font-size="12" fill="#444">月次・週次定型レポート</text>
  <text x="730" y="341" text-anchor="middle" font-size="12" fill="#444">提案書・企画書のドラフト</text>
  <text x="730" y="359" text-anchor="middle" font-size="12" fill="#444">数値データの要約・考察</text>
  <!-- 削減時間 -->
  <rect x="640" y="380" width="180" height="22" fill="#FEF3C7" rx="4"/>
  <text x="730" y="395" text-anchor="middle" font-size="12" fill="#92400E" font-weight="700">平均削減：60分 → 10〜15分</text>

  <!-- カード4: カスタムツール -->
  <rect x="880" y="70" width="280" height="340" fill="#0B1221" rx="12"/>
  <!-- アイコン背景 -->
  <circle cx="1020" cy="128" r="36" fill="#F59E0B"/>
  <!-- ツールアイコン（歯車） -->
  <circle cx="1020" cy="128" r="12" fill="#0B1221"/>
  <circle cx="1020" cy="128" r="7" fill="#F59E0B"/>
  <rect x="1016" y="110" width="8" height="8" fill="#0B1221" rx="1"/>
  <rect x="1016" y="138" width="8" height="8" fill="#0B1221" rx="1"/>
  <rect x="1004" y="124" width="8" height="8" fill="#0B1221" rx="1" transform="rotate(0,1008,128)"/>
  <rect x="1028" y="124" width="8" height="8" fill="#0B1221" rx="1"/>
  <!-- タイトル -->
  <text x="1020" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">API・カスタムツール化</text>
  <!-- 難易度 -->
  <rect x="950" y="198" width="140" height="22" fill="#F59E0B" rx="11"/>
  <text x="1020" y="213" text-anchor="middle" font-size="12" fill="#0B1221" font-weight="700">★★★ エンジニア開発が必要</text>
  <!-- 説明 -->
  <text x="1020" y="248" text-anchor="middle" font-size="12" fill="#D1D5DB">推奨ツール</text>
  <text x="1020" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#F59E0B">ChatGPT / Claude API</text>
  <line x1="920" y1="282" x2="1120" y2="282" stroke="#374151" stroke-width="1"/>
  <text x="1020" y="305" text-anchor="middle" font-size="12" fill="#D1D5DB">実現できるもの</text>
  <text x="1020" y="323" text-anchor="middle" font-size="12" fill="#D1D5DB">Slack Bot・自動返信システム</text>
  <text x="1020" y="341" text-anchor="middle" font-size="12" fill="#D1D5DB">社内ドキュメント検索Bot</text>
  <text x="1020" y="359" text-anchor="middle" font-size="12" fill="#D1D5DB">提案書自動生成ツール</text>
  <!-- スポット依頼 -->
  <rect x="920" y="380" width="200" height="22" fill="#F59E0B" rx="4"/>
  <text x="1020" y="395" text-anchor="middle" font-size="12" fill="#0B1221" font-weight="700">👉 ANKENでスポット依頼可能</text>

  <!-- 注記 -->
  <text x="600" y="450" text-anchor="middle" font-size="11" fill="#AAA">※削減時間は目安です。業務内容・習熟度により異なります。</text>
</svg>
