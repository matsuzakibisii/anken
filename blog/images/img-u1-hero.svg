<svg width="1792" height="1024" viewBox="0 0 1792 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">バックオフィスAI化のイメージ</title>
  <desc id="desc">オフィスデスクの上にノートPCがあり、画面には請求書処理やデータ入力の自動化を示すダッシュボードが表示されている。請求書・カレンダー・グラフのアイコンが矢印でつながり、自動化フローを表現したフラットイラスト。</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#FFF3DC"/>
    </linearGradient>
    <style>
      .navy { fill: #0B1221; }
      .amber { fill: #F59E0B; }
      .amberLight { fill: #FFF7ED; }
      .stroke-navy { stroke: #0B1221; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .stroke-amber { stroke: #F59E0B; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .grey { fill: #E5E7EB; }
    </style>
  </defs>

  <rect width="1792" height="1024" fill="url(#bgGrad)"/>

  <!-- Desk surface -->
  <rect x="0" y="760" width="1792" height="264" fill="#F1E4C8"/>
  <rect x="0" y="752" width="1792" height="14" fill="#E3D2A8"/>

  <!-- Soft decorative circles -->
  <circle cx="160" cy="170" r="120" fill="#FCEAC4" opacity="0.7"/>
  <circle cx="1640" cy="220" r="160" fill="#FCEAC4" opacity="0.6"/>

  <!-- Laptop base -->
  <g>
    <path d="M540 800 L1252 800 L1290 850 L502 850 Z" class="navy"/>
    <rect x="560" y="790" width="672" height="14" rx="4" fill="#1B2840"/>
  </g>

  <!-- Laptop screen -->
  <g>
    <rect x="606" y="330" width="580" height="470" rx="18" class="navy"/>
    <rect x="630" y="356" width="532" height="416" rx="8" fill="#101B30"/>

    <!-- Dashboard header -->
    <rect x="652" y="378" width="488" height="46" rx="8" fill="#1C2A45"/>
    <circle cx="676" cy="401" r="7" fill="#F59E0B"/>
    <rect x="700" y="394" width="160" height="14" rx="4" fill="#E5E7EB" opacity="0.85"/>

    <!-- Invoice card -->
    <rect x="652" y="440" width="230" height="150" rx="10" fill="#1C2A45"/>
    <rect x="672" y="460" width="120" height="12" rx="3" fill="#F59E0B"/>
    <rect x="672" y="484" width="190" height="10" rx="3" fill="#E5E7EB" opacity="0.6"/>
    <rect x="672" y="502" width="190" height="10" rx="3" fill="#E5E7EB" opacity="0.6"/>
    <rect x="672" y="520" width="130" height="10" rx="3" fill="#E5E7EB" opacity="0.6"/>
    <rect x="672" y="552" width="100" height="24" rx="12" fill="#F59E0B"/>
    <text x="722" y="569" text-anchor="middle" font-size="13" font-weight="700" fill="#0B1221" font-family="Noto Sans JP, sans-serif">自動仕訳</text>

    <!-- Chart card -->
    <rect x="910" y="440" width="230" height="150" rx="10" fill="#1C2A45"/>
    <rect x="930" y="554" width="18" height="26" fill="#F59E0B"/>
    <rect x="956" y="534" width="18" height="46" fill="#E5E7EB" opacity="0.7"/>
    <rect x="982" y="510" width="18" height="70" fill="#F59E0B"/>
    <rect x="1008" y="524" width="18" height="56" fill="#E5E7EB" opacity="0.7"/>
    <rect x="1034" y="494" width="18" height="86" fill="#F59E0B"/>
    <rect x="930" y="460" width="120" height="12" rx="3" fill="#E5E7EB" opacity="0.85"/>

    <!-- Bottom progress bar card -->
    <rect x="652" y="610" width="488" height="120" rx="10" fill="#1C2A45"/>
    <rect x="674" y="630" width="170" height="12" rx="3" fill="#E5E7EB" opacity="0.85"/>
    <rect x="674" y="660" width="444" height="14" rx="7" fill="#0B1221"/>
    <rect x="674" y="660" width="320" height="14" rx="7" fill="#F59E0B"/>
    <text x="674" y="704" font-size="14" fill="#E5E7EB" font-family="Noto Sans JP, sans-serif">処理進捗：72%　残り作業を自動化中</text>
  </g>

  <!-- Floating invoice icon (left) -->
  <g transform="translate(300 360)">
    <rect x="0" y="0" width="150" height="190" rx="18" class="amberLight" stroke="#F59E0B" stroke-width="4"/>
    <line x1="30" y1="48" x2="120" y2="48" class="stroke-amber"/>
    <line x1="30" y1="78" x2="120" y2="78" class="stroke-amber"/>
    <line x1="30" y1="108" x2="92" y2="108" class="stroke-amber"/>
    <rect x="30" y="134" width="90" height="32" rx="16" class="navy"/>
    <text x="75" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF" font-family="Noto Sans JP, sans-serif">請求書</text>
  </g>

  <!-- Floating calendar icon (right) -->
  <g transform="translate(1340 380)">
    <rect x="0" y="14" width="170" height="140" rx="18" class="amberLight" stroke="#F59E0B" stroke-width="4"/>
    <line x1="0" y1="58" x2="170" y2="58" stroke="#F59E0B" stroke-width="4"/>
    <line x1="38" y1="0" x2="38" y2="28" class="stroke-amber"/>
    <line x1="132" y1="0" x2="132" y2="28" class="stroke-amber"/>
    <rect x="24" y="78" width="26" height="26" rx="4" class="amber"/>
    <rect x="60" y="78" width="26" height="26" rx="4" class="grey"/>
    <rect x="96" y="78" width="26" height="26" rx="4" class="grey"/>
    <rect x="24" y="114" width="26" height="26" rx="4" class="grey"/>
    <rect x="60" y="114" width="26" height="26" rx="4" class="amber"/>
  </g>

  <!-- Connecting automation arrows -->
  <path d="M460 440 C 540 440, 560 470, 606 480" class="stroke-navy" stroke-dasharray="2 14"/>
  <path d="M1340 450 C 1260 450, 1240 480, 1186 490" class="stroke-navy" stroke-dasharray="2 14"/>

  <!-- small gear / automation badge -->
  <g transform="translate(896 220)">
    <circle cx="0" cy="0" r="46" class="navy"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#F59E0B" stroke-width="5"/>
    <path d="M-18 0 L18 0 M0 -18 L0 18 M-13 -13 L13 13 M-13 13 L13 -13" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="9" fill="#F59E0B"/>
  </g>
</svg>
