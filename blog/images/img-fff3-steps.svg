<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <!-- Background -->
  <rect width="1200" height="480" fill="#FAFAF8"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="900" fill="#1E1B4B">AIチャットボット導入3ステップ（スポット外注活用）</text>

  <!-- STEP 1 card -->
  <rect x="40" y="76" width="320" height="340" rx="16" fill="#EEF2FF" stroke="#4338CA" stroke-width="2"/>
  <rect x="40" y="76" width="320" height="64" rx="16" fill="#4338CA"/>
  <rect x="40" y="118" width="320" height="22" fill="#4338CA"/>
  <text x="200" y="104" text-anchor="middle" font-size="16" font-weight="900" fill="#FFFFFF">STEP 1</text>
  <text x="200" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#C7D2FE">社内作業 / 3〜7日</text>

  <!-- Step 1 icon -->
  <circle cx="200" cy="186" r="36" fill="#4338CA" opacity="0.12"/>
  <text x="200" y="196" text-anchor="middle" font-size="34">📋</text>

  <text x="200" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#1E1B4B">Q&Aリスト整備</text>
  <text x="200" y="274" text-anchor="middle" font-size="12" fill="#374151">繰り返し届く問い合わせを</text>
  <text x="200" y="292" text-anchor="middle" font-size="12" fill="#374151">洗い出し、50〜100問の</text>
  <text x="200" y="310" text-anchor="middle" font-size="12" fill="#374151">Q&Aリストを社内で作成</text>

  <rect x="70" y="330" width="260" height="68" rx="8" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="200" y="352" text-anchor="middle" font-size="11" fill="#4338CA" font-weight="700">💡 コツ</text>
  <text x="200" y="368" text-anchor="middle" font-size="11" fill="#374151">回答は200字以内・</text>
  <text x="200" y="384" text-anchor="middle" font-size="11" fill="#374151">言い回しを3〜5パターン登録</text>

  <!-- Arrow 1→2 -->
  <polygon points="380,256 400,246 400,252 420,252 420,260 400,260 400,266" fill="#F97316"/>
  <text x="400" y="278" text-anchor="middle" font-size="11" fill="#9CA3AF">外注へ</text>

  <!-- STEP 2 card -->
  <rect x="440" y="76" width="320" height="340" rx="16" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <rect x="440" y="76" width="320" height="64" rx="16" fill="#F97316"/>
  <rect x="440" y="118" width="320" height="22" fill="#F97316"/>
  <text x="600" y="104" text-anchor="middle" font-size="16" font-weight="900" fill="#FFFFFF">STEP 2</text>
  <text x="600" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#FED7AA">スポット外注 / 1〜2週間</text>

  <!-- Step 2 icon -->
  <circle cx="600" cy="186" r="36" fill="#F97316" opacity="0.12"/>
  <text x="600" y="196" text-anchor="middle" font-size="34">⚙️</text>

  <text x="600" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#1E1B4B">ツール選定・設定・テスト</text>
  <text x="600" y="274" text-anchor="middle" font-size="12" fill="#374151">スポット外注エンジニアが</text>
  <text x="600" y="292" text-anchor="middle" font-size="12" fill="#374151">最適なチャットボットを選定し</text>
  <text x="600" y="310" text-anchor="middle" font-size="12" fill="#374151">FAQ設定・動作テストを実施</text>

  <rect x="470" y="330" width="260" height="68" rx="8" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1"/>
  <text x="600" y="352" text-anchor="middle" font-size="11" fill="#F97316" font-weight="700">💡 費用目安</text>
  <text x="600" y="368" text-anchor="middle" font-size="11" fill="#374151">5〜20万円（一式委託）</text>
  <text x="600" y="384" text-anchor="middle" font-size="11" fill="#374151">LINE連携追加なら＋3〜10万円</text>

  <!-- Arrow 2→3 -->
  <polygon points="780,256 800,246 800,252 820,252 820,260 800,260 800,266" fill="#4338CA"/>

  <!-- STEP 3 card -->
  <rect x="840" y="76" width="320" height="340" rx="16" fill="#EEF2FF" stroke="#4338CA" stroke-width="2"/>
  <rect x="840" y="76" width="320" height="64" rx="16" fill="#4338CA"/>
  <rect x="840" y="118" width="320" height="22" fill="#4338CA"/>
  <text x="1000" y="104" text-anchor="middle" font-size="16" font-weight="900" fill="#FFFFFF">STEP 3</text>
  <text x="1000" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#C7D2FE">外注＋内部 / 3〜5日</text>

  <!-- Step 3 icon -->
  <circle cx="1000" cy="186" r="36" fill="#4338CA" opacity="0.12"/>
  <text x="1000" y="196" text-anchor="middle" font-size="34">🚀</text>

  <text x="1000" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#1E1B4B">組み込み・運用設計・本稼働</text>
  <text x="1000" y="274" text-anchor="middle" font-size="12" fill="#374151">LINE/Webに設置し</text>
  <text x="1000" y="292" text-anchor="middle" font-size="12" fill="#374151">エスカレーションルールと</text>
  <text x="1000" y="310" text-anchor="middle" font-size="12" fill="#374151">月次Q&A更新フローを整備</text>

  <rect x="870" y="330" width="260" height="68" rx="8" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="1000" y="352" text-anchor="middle" font-size="11" fill="#4338CA" font-weight="700">💡 完了目標</text>
  <text x="1000" y="368" text-anchor="middle" font-size="11" fill="#374151">定型質問の75〜80%を</text>
  <text x="1000" y="384" text-anchor="middle" font-size="11" fill="#374151">AIが24時間自動応答</text>

  <!-- Bottom summary -->
  <rect x="40" y="430" width="1120" height="38" rx="10" fill="#1E1B4B" opacity="0.06"/>
  <text x="600" y="455" text-anchor="middle" font-size="13" font-weight="700" fill="#1E1B4B">Q&amp;Aリスト整備済みなら最短2週間で本稼働｜初期費用目安：5〜20万円・月額費用：5,000〜25,000円</text>
</svg>
