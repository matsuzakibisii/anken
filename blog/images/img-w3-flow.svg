<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <rect width="1200" height="480" fill="#FFFFFF"/>
  <text x="600" y="48" text-anchor="middle" font-size="24" font-weight="900" fill="#0F2E2E">社内ナレッジ検索AI（RAG）導入の4ステップ</text>

  <!-- connecting line -->
  <line x1="150" y1="240" x2="1050" y2="240" stroke="#BFE3DC" stroke-width="3"/>

  <!-- Step 1 -->
  <g>
    <circle cx="150" cy="240" r="42" fill="#0E7C66"/>
    <text x="150" y="248" text-anchor="middle" font-size="20" font-weight="900" fill="#FFFFFF">1</text>
    <rect x="65" y="300" width="170" height="34" fill="none"/>
    <text x="150" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#0F2E2E">対象文書の</text>
    <text x="150" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#0F2E2E">範囲を決める</text>
    <!-- doc icon -->
    <rect x="132" y="178" width="36" height="44" rx="3" fill="#FFFFFF" stroke="#0E7C66" stroke-width="2"/>
    <line x1="139" y1="190" x2="161" y2="190" stroke="#0E7C66" stroke-width="2"/>
    <line x1="139" y1="198" x2="161" y2="198" stroke="#0E7C66" stroke-width="2"/>
    <line x1="139" y1="206" x2="153" y2="206" stroke="#0E7C66" stroke-width="2"/>
  </g>

  <!-- Step 2 -->
  <g>
    <circle cx="450" cy="240" r="42" fill="#16A893"/>
    <text x="450" y="248" text-anchor="middle" font-size="20" font-weight="900" fill="#FFFFFF">2</text>
    <text x="450" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#0F2E2E">検索基盤を</text>
    <text x="450" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#0F2E2E">構築する</text>
    <!-- db icon -->
    <ellipse cx="450" cy="180" rx="20" ry="8" fill="#FFFFFF" stroke="#16A893" stroke-width="2"/>
    <path d="M430,180 v28 a20,8 0 0 0 40,0 v-28" fill="#FFFFFF" stroke="#16A893" stroke-width="2"/>
    <ellipse cx="450" cy="208" rx="20" ry="8" fill="none" stroke="#16A893" stroke-width="2"/>
  </g>

  <!-- Step 3 -->
  <g>
    <circle cx="750" cy="240" r="42" fill="#34BFA3"/>
    <text x="750" y="248" text-anchor="middle" font-size="20" font-weight="900" fill="#FFFFFF">3</text>
    <text x="750" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#0F2E2E">チャットUIで</text>
    <text x="750" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#0F2E2E">試す</text>
    <!-- chat icon -->
    <rect x="728" y="172" width="44" height="32" rx="8" fill="#FFFFFF" stroke="#34BFA3" stroke-width="2"/>
    <polygon points="738,204 738,216 750,204" fill="#FFFFFF" stroke="#34BFA3" stroke-width="2"/>
    <line x1="736" y1="183" x2="764" y2="183" stroke="#34BFA3" stroke-width="2"/>
    <line x1="736" y1="191" x2="756" y2="191" stroke="#34BFA3" stroke-width="2"/>
  </g>

  <!-- Step 4 -->
  <g>
    <circle cx="1050" cy="240" r="42" fill="#0F2E2E"/>
    <text x="1050" y="248" text-anchor="middle" font-size="20" font-weight="900" fill="#FFFFFF">4</text>
    <text x="1050" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#0F2E2E">現場へ</text>
    <text x="1050" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#0F2E2E">展開する</text>
    <!-- people icon -->
    <circle cx="1040" cy="180" r="8" fill="#FFFFFF" stroke="#0F2E2E" stroke-width="2"/>
    <path d="M1027,202 q13,-14 26,0" fill="#FFFFFF" stroke="#0F2E2E" stroke-width="2"/>
    <circle cx="1060" cy="184" r="6" fill="#FFFFFF" stroke="#0F2E2E" stroke-width="2"/>
    <path d="M1051,200 q9,-10 18,0" fill="#FFFFFF" stroke="#0F2E2E" stroke-width="2"/>
  </g>

  <!-- arrows between -->
  <polygon points="300,240 286,234 286,246" fill="#0E7C66"/>
  <polygon points="600,240 586,234 586,246" fill="#16A893"/>
  <polygon points="900,240 886,234 886,246" fill="#34BFA3"/>

  <rect x="120" y="400" width="960" height="56" rx="12" fill="#F2FAF8" stroke="#BFE3DC" stroke-width="1.5"/>
  <text x="600" y="433" text-anchor="middle" font-size="13.5" fill="#0F2E2E">週末2〜3日のスポット稼働でSTEP1〜3のプロトタイプまで進められる場合があります</text>
</svg>
