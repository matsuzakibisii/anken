<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1200" height="480" fill="#FFFBF8"/>

  <text x="600" y="46" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="24" font-weight="700" fill="#2A211C">職種によって変わる研修テーマ</text>

  <!-- Card 1: general office/sales -->
  <rect x="80" y="84" width="480" height="356" rx="20" fill="#FFFFFF" stroke="#E3B59C" stroke-width="2"/>
  <rect x="80" y="84" width="480" height="64" rx="20" fill="#2A211C"/>
  <rect x="80" y="116" width="480" height="32" fill="#2A211C"/>
  <text x="320" y="124" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">一般事務・営業職向け</text>

  <!-- doc icon -->
  <rect x="290" y="172" width="60" height="76" rx="6" fill="#FDEEE6" stroke="#C2542D" stroke-width="2"/>
  <line x1="302" y1="192" x2="338" y2="192" stroke="#C2542D" stroke-width="3"/>
  <line x1="302" y1="206" x2="338" y2="206" stroke="#C2542D" stroke-width="3"/>
  <line x1="302" y1="220" x2="326" y2="220" stroke="#C2542D" stroke-width="3"/>

  <text x="320" y="278" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#9C3D1A">汎用的な文書業務が中心</text>

  <text x="120" y="312" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#44403C">・メール文面の下書き</text>
  <text x="120" y="340" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#44403C">・議事録の要約・整理</text>
  <text x="120" y="368" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#44403C">・提案書のアウトライン作成</text>
  <text x="120" y="404" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#8C6A57">→ プロンプトの基本型を覚えると</text>
  <text x="120" y="424" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#8C6A57">　応用が早い層</text>

  <!-- Card 2: specialist roles -->
  <rect x="640" y="84" width="480" height="356" rx="20" fill="#FFFFFF" stroke="#E3B59C" stroke-width="2"/>
  <rect x="640" y="84" width="480" height="64" rx="20" fill="#C2542D"/>
  <rect x="640" y="116" width="480" height="32" fill="#C2542D"/>
  <text x="880" y="124" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">専門職（介護・士業・製造現場 等）</text>

  <!-- shield/specialist icon -->
  <path d="M880,172 L912,186 L912,222 C912,242 898,254 880,260 C862,254 848,242 848,222 L848,186 Z" fill="#FDEEE6" stroke="#C2542D" stroke-width="2"/>
  <path d="M868,212 L878,222 L896,200" fill="none" stroke="#C2542D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="880" y="278" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#9C3D1A">業務知識×AIの組み合わせが必要</text>

  <text x="680" y="312" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#44403C">・記録業務の要約・申し送り整理</text>
  <text x="680" y="340" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#44403C">・契約書・議事録のチェック観点整理</text>
  <text x="680" y="368" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#44403C">・業界特有の専門業務テーマ</text>
  <text x="680" y="404" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#8C6A57">→ 情報の機密性が高く、入力範囲の</text>
  <text x="680" y="424" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#8C6A57">　線引きをより具体的に示す必要あり</text>

</svg>
