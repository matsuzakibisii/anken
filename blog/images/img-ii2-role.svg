<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="500" fill="#F8FAFC"/>
  <text x="600" y="50" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="26" font-weight="700" fill="#0F172A">「ビジネス理解」と「AI実装力」が重なる領域がFDE</text>

  <!-- Left circle: business understanding -->
  <circle cx="460" cy="280" r="170" fill="#0369A1" opacity="0.16" stroke="#0369A1" stroke-width="2.5"/>
  <!-- Right circle: AI implementation -->
  <circle cx="740" cy="280" r="170" fill="#FB923C" opacity="0.20" stroke="#FB923C" stroke-width="2.5"/>

  <!-- Overlap emphasis -->
  <ellipse cx="600" cy="280" rx="95" ry="150" fill="#1E293B" opacity="0.85"/>

  <!-- Labels left -->
  <text x="370" y="160" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="20" font-weight="700" fill="#0369A1">ビジネス理解</text>
  <text x="370" y="190" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="13" fill="#075985">業務フロー／業界知識</text>
  <text x="370" y="212" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="13" fill="#075985">現場のヒアリング力</text>

  <!-- Labels right -->
  <text x="830" y="160" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="20" font-weight="700" fill="#C2410C">AI実装力</text>
  <text x="830" y="190" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="13" fill="#9A3412">LLMアプリ開発</text>
  <text x="830" y="212" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="13" fill="#9A3412">プロトタイピング</text>

  <!-- Center label -->
  <text x="600" y="270" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF">FDE</text>
  <text x="600" y="296" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="12" fill="#E2E8F0">PoC〜実装〜導入</text>
  <text x="600" y="314" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="12" fill="#E2E8F0">を一気通貫で担う</text>

  <!-- Bottom caption -->
  <text x="600" y="465" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="14" fill="#475569">どちらか一方だけでは「PoC止まり」「現場に合わない」が起きやすい</text>
</svg>
