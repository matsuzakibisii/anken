<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" width="1200" height="500">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="500" fill="#F0FDF4"/>

  <!-- タイトル -->
  <text x="600" y="52" text-anchor="middle" font-size="22" font-weight="900" fill="#1E1B4B">RPAの3大エラーパターンとAI画面監視による自動復旧の解決策</text>

  <!-- カード1 -->
  <rect x="40" y="80" width="340" height="380" rx="14" fill="#1E1B4B"/>
  <rect x="40" y="80" width="340" height="6" rx="3" fill="#84CC16"/>
  <!-- アイコン枠 -->
  <circle cx="210" cy="155" r="38" fill="#2D2A52"/>
  <!-- ポップアップアイコン -->
  <rect x="185" y="132" width="50" height="38" rx="4" fill="#84CC16" opacity="0.9"/>
  <rect x="188" y="135" width="44" height="12" rx="2" fill="#1E1B4B" opacity="0.6"/>
  <rect x="196" y="153" width="28" height="6" rx="2" fill="#1E1B4B" opacity="0.4"/>
  <rect x="192" y="163" width="18" height="4" rx="2" fill="#1E1B4B" opacity="0.3"/>
  <!-- 閉じるバツ -->
  <line x1="225" y1="136" x2="231" y2="142" stroke="#1E1B4B" stroke-width="2"/>
  <line x1="231" y1="136" x2="225" y2="142" stroke="#1E1B4B" stroke-width="2"/>

  <text x="210" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#84CC16">エラーパターン①</text>
  <text x="210" y="242" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">ポップアップ・</text>
  <text x="210" y="265" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">確認ダイアログ</text>
  <line x1="80" y1="285" x2="340" y2="285" stroke="#84CC16" stroke-width="1" opacity="0.3"/>
  <text x="210" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#84CC16">AI解決策</text>
  <text x="210" y="338" text-anchor="middle" font-size="14" fill="#E2E8F0">ボタンを画像認識で検出し</text>
  <text x="210" y="360" text-anchor="middle" font-size="14" fill="#E2E8F0">自動クリックして処理続行</text>
  <text x="210" y="385" text-anchor="middle" font-size="13" fill="#94A3B8">対応率：既知パターンの</text>
  <text x="210" y="405" text-anchor="middle" font-size="13" fill="#84CC16">約90〜95%</text>
  <text x="210" y="432" text-anchor="middle" font-size="12" fill="#64748B">発生頻度：月数回〜週1回</text>

  <!-- カード2 -->
  <rect x="430" y="80" width="340" height="380" rx="14" fill="#1E1B4B"/>
  <rect x="430" y="80" width="340" height="6" rx="3" fill="#84CC16"/>
  <!-- セッションアイコン -->
  <circle cx="600" cy="155" r="38" fill="#2D2A52"/>
  <rect x="578" y="133" width="44" height="32" rx="4" fill="#84CC16" opacity="0.85"/>
  <rect x="584" y="139" width="22" height="6" rx="2" fill="#1E1B4B" opacity="0.5"/>
  <rect x="584" y="149" width="16" height="6" rx="2" fill="#1E1B4B" opacity="0.5"/>
  <circle cx="616" cy="162" r="10" fill="#1E1B4B" opacity="0.4"/>
  <line x1="609" y1="162" x2="616" y2="155" stroke="#84CC16" stroke-width="2"/>
  <line x1="616" y1="155" x2="616" y2="168" stroke="#84CC16" stroke-width="2"/>

  <text x="600" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#84CC16">エラーパターン②</text>
  <text x="600" y="242" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">セッション切れ・</text>
  <text x="600" y="265" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">ログイン画面遷移</text>
  <line x1="470" y1="285" x2="730" y2="285" stroke="#84CC16" stroke-width="1" opacity="0.3"/>
  <text x="600" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#84CC16">AI解決策</text>
  <text x="600" y="338" text-anchor="middle" font-size="14" fill="#E2E8F0">ログイン画面を検知して</text>
  <text x="600" y="360" text-anchor="middle" font-size="14" fill="#E2E8F0">自動再ログイン後に処理再開</text>
  <text x="600" y="385" text-anchor="middle" font-size="13" fill="#94A3B8">パスワードは暗号化保管で</text>
  <text x="600" y="405" text-anchor="middle" font-size="13" fill="#84CC16">セキュリティ安全設計</text>
  <text x="600" y="432" text-anchor="middle" font-size="12" fill="#64748B">発生頻度：長時間バッチで多発</text>

  <!-- カード3 -->
  <rect x="820" y="80" width="340" height="380" rx="14" fill="#1E1B4B"/>
  <rect x="820" y="80" width="340" height="6" rx="3" fill="#84CC16"/>
  <!-- UIレイアウトアイコン -->
  <circle cx="990" cy="155" r="38" fill="#2D2A52"/>
  <rect x="968" y="135" width="44" height="32" rx="3" fill="none" stroke="#84CC16" stroke-width="2" opacity="0.8"/>
  <rect x="972" y="139" width="14" height="24" rx="2" fill="#84CC16" opacity="0.5"/>
  <rect x="990" y="139" width="18" height="10" rx="2" fill="#84CC16" opacity="0.7"/>
  <rect x="990" y="153" width="18" height="10" rx="2" fill="#84CC16" opacity="0.4"/>
  <!-- 変化矢印 -->
  <text x="1007" y="163" font-size="14" fill="#84CC16" text-anchor="middle">↔</text>

  <text x="990" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#84CC16">エラーパターン③</text>
  <text x="990" y="242" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">画面レイアウト変化・</text>
  <text x="990" y="265" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">ボタン位置ずれ</text>
  <line x1="860" y1="285" x2="1120" y2="285" stroke="#84CC16" stroke-width="1" opacity="0.3"/>
  <text x="990" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#84CC16">AI解決策</text>
  <text x="990" y="338" text-anchor="middle" font-size="14" fill="#E2E8F0">ラベルテキスト・形状認識で</text>
  <text x="990" y="360" text-anchor="middle" font-size="14" fill="#E2E8F0">座標に依存せず動的に検出</text>
  <text x="990" y="385" text-anchor="middle" font-size="13" fill="#94A3B8">ベンダーのUI更新にも</text>
  <text x="990" y="405" text-anchor="middle" font-size="13" fill="#84CC16">自動追従できる設計</text>
  <text x="990" y="432" text-anchor="middle" font-size="12" fill="#64748B">発生頻度：リリース更新後に発生</text>

  <!-- 出典フッター -->
  <text x="600" y="490" text-anchor="middle" font-size="11" fill="#94A3B8">ANKEN編集部作成｜製造業・加工業のRPA運用事例をもとにパターン分類</text>
</svg>
