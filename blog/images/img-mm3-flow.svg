<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" style="background:#F0FDF4;">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&amp;display=swap');
      text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <!-- タイトル -->
  <text x="600" y="55" text-anchor="middle" font-size="28" font-weight="900" fill="#1F2937">FDE副業を始めるための3ステップ</text>
  <text x="600" y="84" text-anchor="middle" font-size="15" fill="#6B7280">スポット案件を受注するまでの流れ</text>

  <!-- ステップ1 カード -->
  <rect x="55" y="110" width="290" height="300" rx="16" ry="16" fill="#FFFFFF" stroke="#10B981" stroke-width="2.5"/>
  <!-- ステップ番号 -->
  <circle cx="200" cy="155" r="32" fill="#10B981"/>
  <text x="200" y="163" text-anchor="middle" font-size="22" font-weight="900" fill="#FFFFFF">01</text>

  <text x="200" y="218" text-anchor="middle" font-size="19" font-weight="900" fill="#1F2937">スキルの棚卸し</text>

  <rect x="85" y="234" width="230" height="2" rx="1" fill="#D1FAE5"/>

  <text x="200" y="263" text-anchor="middle" font-size="13" fill="#374151">・LLM API利用経験を整理</text>
  <text x="200" y="286" text-anchor="middle" font-size="13" fill="#374151">・業務理解・橋渡し経験を整理</text>
  <text x="200" y="309" text-anchor="middle" font-size="13" fill="#374151">・「FDE視点の強み」を言語化</text>

  <rect x="95" y="340" width="210" height="50" rx="10" ry="10" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="200" y="360" text-anchor="middle" font-size="12" fill="#065F46">✓ 自己PRの準備完了</text>
  <text x="200" y="378" text-anchor="middle" font-size="12" fill="#065F46">✓ 対応可能範囲が明確に</text>

  <!-- 矢印1 -->
  <line x1="345" y1="260" x2="415" y2="260" stroke="#10B981" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="380" y="248" text-anchor="middle" font-size="12" fill="#10B981" font-weight="700">登録</text>

  <!-- ステップ2 カード -->
  <rect x="425" y="110" width="290" height="300" rx="16" ry="16" fill="#FFFFFF" stroke="#10B981" stroke-width="2.5"/>
  <circle cx="570" cy="155" r="32" fill="#10B981"/>
  <text x="570" y="163" text-anchor="middle" font-size="22" font-weight="900" fill="#FFFFFF">02</text>

  <text x="570" y="218" text-anchor="middle" font-size="19" font-weight="900" fill="#1F2937">ANKENに登録</text>

  <rect x="455" y="234" width="230" height="2" rx="1" fill="#D1FAE5"/>

  <text x="570" y="263" text-anchor="middle" font-size="13" fill="#374151">・FDE対応可能範囲を明示</text>
  <text x="570" y="286" text-anchor="middle" font-size="13" fill="#374151">・AI導入支援キーワードを記載</text>
  <text x="570" y="309" text-anchor="middle" font-size="13" fill="#374151">・希望稼働時間・単価を設定</text>

  <rect x="465" y="340" width="210" height="50" rx="10" ry="10" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="570" y="360" text-anchor="middle" font-size="12" fill="#065F46">✓ 発注者から検索される</text>
  <text x="570" y="378" text-anchor="middle" font-size="12" fill="#065F46">✓ マッチング通知が届く</text>

  <!-- 矢印2 -->
  <line x1="715" y1="260" x2="785" y2="260" stroke="#10B981" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="750" y="248" text-anchor="middle" font-size="12" fill="#10B981" font-weight="700">受注</text>

  <!-- ステップ3 カード -->
  <rect x="795" y="110" width="350" height="300" rx="16" ry="16" fill="#1F2937" stroke="#10B981" stroke-width="2.5"/>
  <circle cx="970" cy="155" r="32" fill="#F59E0B"/>
  <text x="970" y="163" text-anchor="middle" font-size="22" font-weight="900" fill="#FFFFFF">03</text>

  <text x="970" y="218" text-anchor="middle" font-size="19" font-weight="900" fill="#FFFFFF">小さな案件から</text>
  <text x="970" y="242" text-anchor="middle" font-size="19" font-weight="900" fill="#FFFFFF">実績を積み上げる</text>

  <rect x="825" y="258" width="290" height="2" rx="1" fill="#374151"/>

  <text x="970" y="286" text-anchor="middle" font-size="13" fill="#D1FAE5">API組み込み（1〜3日）から開始</text>
  <text x="970" y="309" text-anchor="middle" font-size="13" fill="#D1FAE5">タスク完遂→発注者の信頼獲得</text>
  <text x="970" y="332" text-anchor="middle" font-size="13" fill="#D1FAE5">リピート・紹介案件へと発展</text>

  <rect x="835" y="352" width="270" height="40" rx="10" ry="10" fill="#F59E0B"/>
  <text x="970" y="377" text-anchor="middle" font-size="14" font-weight="700" fill="#1F2937">→ 高単価 FDE案件へ昇格</text>

  <!-- 底部注釈 -->
  <text x="600" y="450" text-anchor="middle" font-size="13" fill="#6B7280">ANKENではエンジニア登録無料・案件紹介手数料なし。週末スポットから参画できます。</text>
</svg>
