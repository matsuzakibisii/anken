<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <rect width="1200" height="480" fill="#FAFAFE"/>

  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="900" fill="#1E1B4B">Notion・Slack連携でよくある失敗と対策</text>

  <!-- Card 1 -->
  <g>
    <rect x="60" y="90" width="340" height="340" rx="18" fill="#FFFFFF" stroke="#E0E7FF" stroke-width="2"/>
    <rect x="60" y="90" width="340" height="64" rx="18" fill="#4338CA"/>
    <rect x="60" y="132" width="340" height="22" fill="#4338CA"/>
    <text x="230" y="130" text-anchor="middle" font-size="16" font-weight="900" fill="#FFFFFF">失敗1｜転記条件があいまい</text>

    <circle cx="230" cy="225" r="40" fill="#EEF2FF" stroke="#4338CA" stroke-width="2"/>
    <text x="230" y="240" text-anchor="middle" font-size="34" font-weight="900" fill="#4338CA">?</text>

    <text x="90" y="300" font-size="13" fill="#3F3F66">
      <tspan x="90" dy="0">「重要そうな発言」を基準にすると</tspan>
      <tspan x="90" dy="20">人によって判断がぶれ、必要な情報</tspan>
      <tspan x="90" dy="20">が抜け落ちる。</tspan>
    </text>

    <rect x="90" y="365" width="280" height="46" rx="8" fill="#ECFCCB"/>
    <text x="105" y="393" font-size="12.5" font-weight="700" fill="#3F6212">対策：絵文字など明確な合図を決める</text>
  </g>

  <!-- Card 2 -->
  <g>
    <rect x="430" y="90" width="340" height="340" rx="18" fill="#FFFFFF" stroke="#E0E7FF" stroke-width="2"/>
    <rect x="430" y="90" width="340" height="64" rx="18" fill="#4338CA"/>
    <rect x="430" y="132" width="340" height="22" fill="#4338CA"/>
    <text x="600" y="130" text-anchor="middle" font-size="16" font-weight="900" fill="#FFFFFF">失敗2｜棚卸し未実施</text>

    <g>
      <rect x="572" y="195" width="56" height="14" rx="3" fill="#A5B4FC"/>
      <rect x="580" y="212" width="56" height="14" rx="3" fill="#818CF8"/>
      <rect x="566" y="229" width="56" height="14" rx="3" fill="#6366F1"/>
      <rect x="588" y="246" width="56" height="14" rx="3" fill="#4338CA"/>
    </g>

    <text x="460" y="300" font-size="13" fill="#3F3F66">
      <tspan x="460" dy="0">乱立したチャンネル・ページを</tspan>
      <tspan x="460" dy="20">そのまま対象にすると、整理されて</tspan>
      <tspan x="460" dy="20">いない情報がさらに増える。</tspan>
    </text>

    <rect x="460" y="365" width="280" height="46" rx="8" fill="#ECFCCB"/>
    <text x="475" y="393" font-size="12.5" font-weight="700" fill="#3F6212">対策：連携前に構造を棚卸しする</text>
  </g>

  <!-- Card 3 -->
  <g>
    <rect x="800" y="90" width="340" height="340" rx="18" fill="#FFFFFF" stroke="#E0E7FF" stroke-width="2"/>
    <rect x="800" y="90" width="340" height="64" rx="18" fill="#4338CA"/>
    <rect x="800" y="132" width="340" height="22" fill="#4338CA"/>
    <text x="970" y="130" text-anchor="middle" font-size="16" font-weight="900" fill="#FFFFFF">失敗3｜通知過多</text>

    <path d="M970,195 a26,26 0 0 1 26,26 v16 l10,12 h-72 l10,-12 v-16 a26,26 0 0 1 26,-26 z" fill="#EEF2FF" stroke="#4338CA" stroke-width="2"/>
    <circle cx="970" cy="190" r="6" fill="#4338CA"/>
    <circle cx="1000" cy="208" r="9" fill="#84CC16"/>
    <text x="1000" y="212" text-anchor="middle" font-size="11" font-weight="900" fill="#1E1B4B">!</text>

    <text x="830" y="300" font-size="13" fill="#3F3F66">
      <tspan x="830" dy="0">全員に同じ粒度で通知すると、</tspan>
      <tspan x="830" dy="20">必要な情報の濃度が薄まり、</tspan>
      <tspan x="830" dy="20">結局読まれなくなる。</tspan>
    </text>

    <rect x="830" y="365" width="280" height="46" rx="8" fill="#ECFCCB"/>
    <text x="845" y="393" font-size="12.5" font-weight="700" fill="#3F6212">対策：役割に応じて通知粒度を調整</text>
  </g>

</svg>
