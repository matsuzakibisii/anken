<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" width="1200" height="500">
  <defs>
    <style>
      text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="500" fill="#FAFAFA" rx="12"/>

  <!-- タイトル -->
  <text x="600" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#0B1221">AI業務効率化の5ステップと時間削減効果の目安</text>

  <!-- 凡例 -->
  <rect x="820" y="60" width="18" height="18" fill="#E5E7EB" rx="3"/>
  <text x="844" y="74" font-size="13" fill="#555">導入前（従来）</text>
  <rect x="960" y="60" width="18" height="18" fill="#F59E0B" rx="3"/>
  <text x="984" y="74" font-size="13" fill="#555">AI活用後</text>

  <!-- 棒グラフエリア -->
  <!-- Y軸ラベル -->
  <text x="88" y="110" text-anchor="end" font-size="12" fill="#888">60分</text>
  <text x="88" y="170" text-anchor="end" font-size="12" fill="#888">45分</text>
  <text x="88" y="230" text-anchor="end" font-size="12" fill="#888">30分</text>
  <text x="88" y="290" text-anchor="end" font-size="12" fill="#888">20分</text>
  <text x="88" y="350" text-anchor="end" font-size="12" fill="#888">10分</text>
  <text x="88" y="400" text-anchor="end" font-size="12" fill="#888">0分</text>

  <!-- グリッド線 -->
  <line x1="100" y1="107" x2="1150" y2="107" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="100" y1="167" x2="1150" y2="167" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="100" y1="227" x2="1150" y2="227" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="100" y1="287" x2="1150" y2="287" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="100" y1="347" x2="1150" y2="347" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="100" y1="397" x2="1150" y2="397" stroke="#0B1221" stroke-width="2"/>

  <!-- メール作成 -->
  <!-- 導入前: 15分 -->
  <rect x="145" y="247" width="80" height="150" fill="#E5E7EB" rx="4"/>
  <text x="185" y="240" text-anchor="middle" font-size="12" fill="#555">15分</text>
  <!-- AI後: 3分 -->
  <rect x="235" y="367" width="80" height="30" fill="#F59E0B" rx="4"/>
  <text x="275" y="362" text-anchor="middle" font-size="12" fill="#F59E0B" font-weight="700">3分</text>
  <!-- ラベル -->
  <text x="240" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#0B1221">メール</text>
  <text x="240" y="447" text-anchor="middle" font-size="12" fill="#666">作成・返信</text>
  <!-- 削減率 -->
  <rect x="155" y="455" width="170" height="28" fill="#FEF3C7" rx="4"/>
  <text x="240" y="473" text-anchor="middle" font-size="12" fill="#92400E" font-weight="700">▼ 80% 削減</text>

  <!-- 議事録 -->
  <!-- 導入前: 45分 -->
  <rect x="395" y="167" width="80" height="230" fill="#E5E7EB" rx="4"/>
  <text x="435" y="160" text-anchor="middle" font-size="12" fill="#555">45分</text>
  <!-- AI後: 8分 -->
  <rect x="485" y="317" width="80" height="80" fill="#F59E0B" rx="4"/>
  <text x="525" y="310" text-anchor="middle" font-size="12" fill="#F59E0B" font-weight="700">8分</text>
  <!-- ラベル -->
  <text x="490" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#0B1221">議事録</text>
  <text x="490" y="447" text-anchor="middle" font-size="12" fill="#666">作成・整形</text>
  <!-- 削減率 -->
  <rect x="405" y="455" width="170" height="28" fill="#FEF3C7" rx="4"/>
  <text x="490" y="473" text-anchor="middle" font-size="12" fill="#92400E" font-weight="700">▼ 82% 削減</text>

  <!-- 報告書 -->
  <!-- 導入前: 60分 -->
  <rect x="645" y="107" width="80" height="290" fill="#E5E7EB" rx="4"/>
  <text x="685" y="100" text-anchor="middle" font-size="12" fill="#555">60分</text>
  <!-- AI後: 12分 -->
  <rect x="735" y="277" width="80" height="120" fill="#F59E0B" rx="4"/>
  <text x="775" y="270" text-anchor="middle" font-size="12" fill="#F59E0B" font-weight="700">12分</text>
  <!-- ラベル -->
  <text x="740" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#0B1221">報告書</text>
  <text x="740" y="447" text-anchor="middle" font-size="12" fill="#666">・提案資料</text>
  <!-- 削減率 -->
  <rect x="655" y="455" width="170" height="28" fill="#FEF3C7" rx="4"/>
  <text x="740" y="473" text-anchor="middle" font-size="12" fill="#92400E" font-weight="700">▼ 80% 削減</text>

  <!-- 情報収集 -->
  <!-- 導入前: 30分 -->
  <rect x="895" y="227" width="80" height="170" fill="#E5E7EB" rx="4"/>
  <text x="935" y="220" text-anchor="middle" font-size="12" fill="#555">30分</text>
  <!-- AI後: 10分 -->
  <rect x="985" y="297" width="80" height="100" fill="#F59E0B" rx="4"/>
  <text x="1025" y="290" text-anchor="middle" font-size="12" fill="#F59E0B" font-weight="700">10分</text>
  <!-- ラベル -->
  <text x="990" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#0B1221">情報収集</text>
  <text x="990" y="447" text-anchor="middle" font-size="12" fill="#666">・市場調査</text>
  <!-- 削減率 -->
  <rect x="905" y="455" width="170" height="28" fill="#FEF3C7" rx="4"/>
  <text x="990" y="473" text-anchor="middle" font-size="12" fill="#92400E" font-weight="700">▼ 67% 削減</text>

  <!-- 注記 -->
  <text x="600" y="497" text-anchor="middle" font-size="11" fill="#AAA">※削減効果はプロンプトの設計・業務の複雑さにより異なります。目安として参考にしてください。</text>
</svg>
