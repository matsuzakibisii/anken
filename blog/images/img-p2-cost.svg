<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">大手受託開発 vs スポット依頼の費用構造比較</title>
  <desc id="desc">大手受託開発とスポット依頼の費用構造を比較した積み上げ棒グラフ。大手受託開発は管理費、要件定義、テスト、開発に分かれ、スポット依頼はほぼ全体が開発費で構成される。</desc>

  <defs>
    <style>
      .font { font-family: "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .amber { fill: #F59E0B; }
      .axis { stroke: #0B1221; stroke-width: 2; }
      .grid { stroke: #E5E7EB; stroke-width: 1; }
      .small { font-size: 14px; font-weight: 500; fill: #0B1221; }
      .label { font-size: 18px; font-weight: 700; fill: #0B1221; }
      .title { font-size: 30px; font-weight: 900; fill: #0B1221; }
      .inside-light { font-size: 16px; font-weight: 700; fill: #0B1221; }
      .inside-dark { font-size: 16px; font-weight: 700; fill: #FFFFFF; }
      .legend { font-size: 14px; font-weight: 600; fill: #0B1221; }
    </style>
  </defs>

  <rect width="1200" height="500" fill="#FFFFFF"/>

  <text x="600" y="52" text-anchor="middle" class="font title">大手受託開発 vs スポット依頼の費用構造比較</text>

  <line x1="140" y1="120" x2="1080" y2="120" class="grid"/>
  <line x1="140" y1="190" x2="1080" y2="190" class="grid"/>
  <line x1="140" y1="260" x2="1080" y2="260" class="grid"/>
  <line x1="140" y1="330" x2="1080" y2="330" class="grid"/>
  <line x1="140" y1="400" x2="1080" y2="400" class="axis"/>

  <text x="125" y="405" text-anchor="end" class="font small">0%</text>
  <text x="125" y="335" text-anchor="end" class="font small">25%</text>
  <text x="125" y="265" text-anchor="end" class="font small">50%</text>
  <text x="125" y="195" text-anchor="end" class="font small">75%</text>
  <text x="125" y="125" text-anchor="end" class="font small">100%</text>

  <g>
    <rect x="290" y="302" width="170" height="98" fill="#0B1221"/>
    <rect x="290" y="260" width="170" height="42" fill="#E5E7EB"/>
    <rect x="290" y="204" width="170" height="56" fill="#BFC6D1"/>
    <rect x="290" y="120" width="170" height="84" fill="#8C96A8"/>
    <rect x="290" y="120" width="170" height="280" fill="none" stroke="#0B1221" stroke-width="2"/>
    <text x="375" y="168" text-anchor="middle" class="font inside-dark">管理費 30%</text>
    <text x="375" y="237" text-anchor="middle" class="font inside-light">要件定義 20%</text>
    <text x="375" y="286" text-anchor="middle" class="font inside-light">テスト 15%</text>
    <text x="375" y="356" text-anchor="middle" class="font inside-dark">開発 35%</text>
    <text x="375" y="440" text-anchor="middle" class="font label">大手受託開発</text>
  </g>

  <g>
    <rect x="740" y="120" width="170" height="280" class="amber"/>
    <rect x="740" y="120" width="170" height="280" fill="none" stroke="#0B1221" stroke-width="2"/>
    <text x="825" y="255" text-anchor="middle" class="font inside-dark">開発費</text>
    <text x="825" y="282" text-anchor="middle" class="font inside-dark">ほぼ100%</text>
    <text x="825" y="440" text-anchor="middle" class="font label">スポット依頼</text>
  </g>

  <g>
    <rect x="936" y="142" width="182" height="78" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
    <text x="1027" y="172" text-anchor="middle" class="font small" font-weight="700">ポイント</text>
    <text x="1027" y="195" text-anchor="middle" class="font small">中間コストが少なく</text>
    <text x="1027" y="214" text-anchor="middle" class="font small">費用が開発に直結</text>
  </g>

  <g>
    <rect x="160" y="80" width="16" height="16" fill="#8C96A8"/>
    <text x="184" y="93" class="font legend">管理費</text>
    <rect x="255" y="80" width="16" height="16" fill="#BFC6D1"/>
    <text x="279" y="93" class="font legend">要件定義</text>
    <rect x="378" y="80" width="16" height="16" fill="#E5E7EB"/>
    <text x="402" y="93" class="font legend">テスト</text>
    <rect x="475" y="80" width="16" height="16" fill="#0B1221"/>
    <text x="499" y="93" class="font legend">開発</text>
    <rect x="560" y="80" width="16" height="16" fill="#F59E0B"/>
    <text x="584" y="93" class="font legend">スポット依頼の開発費</text>
  </g>
</svg>
