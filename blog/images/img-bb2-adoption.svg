<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <rect width="1200" height="500" fill="#0F0B1E"/>
  <text x="600" y="55" text-anchor="middle" font-size="26" font-weight="700" fill="#F5F3FF">専門サービス業と税理士・会計事務所のAI活用率</text>

  <!-- Gauge 1: 66% -->
  <g transform="translate(330,250)">
    <path d="M -150 0 A 150 150 0 0 1 150 0" fill="none" stroke="#2A2440" stroke-width="26"/>
    <path d="M -150 0 A 150 150 0 0 1 49 -142.5" fill="none" stroke="#7C3AED" stroke-width="26" stroke-linecap="round"/>
    <text x="0" y="-30" text-anchor="middle" font-size="42" font-weight="900" fill="#FFFFFF">66%</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" fill="#C4B5FD">専門サービス業全体</text>
    <text x="0" y="32" text-anchor="middle" font-size="14" fill="#C4B5FD">業務でAIを活用</text>
  </g>

  <!-- Gauge 2: 40% -->
  <g transform="translate(870,250)">
    <path d="M -150 0 A 150 150 0 0 1 150 0" fill="none" stroke="#2A2440" stroke-width="26"/>
    <path d="M -150 0 A 150 150 0 0 1 -30 -148" fill="none" stroke="#0D9488" stroke-width="26" stroke-linecap="round"/>
    <text x="0" y="-30" text-anchor="middle" font-size="42" font-weight="900" fill="#FFFFFF">40%</text>
    <text x="0" y="10" text-anchor="middle" font-size="14" fill="#99F6E4">税理士・会計事務所</text>
    <text x="0" y="32" text-anchor="middle" font-size="14" fill="#99F6E4">実務でAIを活用</text>
  </g>

  <text x="600" y="450" text-anchor="middle" font-size="15" fill="#A99FC9">「使った方がいい」と「実務に組み込めている」の間に差がある</text>
  <text x="600" y="475" text-anchor="middle" font-size="12" fill="#766C99">※業界調査に基づく目安値です</text>
</svg>
