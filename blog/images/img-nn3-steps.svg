<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" width="1200" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&amp;display=swap');
      text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EAB308"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="480" fill="#F8FFFE"/>

  <!-- タイトル -->
  <text x="600" y="48" text-anchor="middle" font-size="22" font-weight="900" fill="#0F766E">スポット外注で不動産AI活用を実現する3ステップ</text>

  <!-- 矢印1 (STEP1→STEP2) -->
  <line x1="370" y1="240" x2="430" y2="240" stroke="#EAB308" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- 矢印2 (STEP2→STEP3) -->
  <line x1="770" y1="240" x2="830" y2="240" stroke="#EAB308" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- STEP 1 カード -->
  <rect x="60" y="100" width="310" height="290" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="2.5"/>
  <!-- ステップナンバーバッジ -->
  <circle cx="215" cy="100" r="28" fill="#0F766E"/>
  <text x="215" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#EAB308">STEP</text>
  <text x="215" y="112" text-anchor="middle" font-size="18" font-weight="900" fill="#EAB308">1</text>
  <!-- アイコン：ターゲット/絞り込み -->
  <circle cx="215" cy="175" r="38" fill="#E6FFFA" stroke="#0F766E" stroke-width="2"/>
  <circle cx="215" cy="175" r="22" fill="none" stroke="#0F766E" stroke-width="2"/>
  <circle cx="215" cy="175" r="9" fill="#EAB308"/>
  <!-- テキスト -->
  <text x="215" y="245" text-anchor="middle" font-size="15" font-weight="900" fill="#0F766E">業務を1つ絞る</text>
  <text x="215" y="268" text-anchor="middle" font-size="12" fill="#374151">最初は「物件説明文の</text>
  <text x="215" y="286" text-anchor="middle" font-size="12" fill="#374151">自動生成」など、</text>
  <text x="215" y="304" text-anchor="middle" font-size="12" fill="#374151">スコープを1領域に絞る</text>
  <text x="215" y="330" text-anchor="middle" font-size="12" fill="#374151">→ 効果測定が簡単で</text>
  <text x="215" y="348" text-anchor="middle" font-size="12" fill="#374151">担当者が毎日使う場面を選ぶ</text>
  <!-- 期間タグ -->
  <rect x="130" y="368" width="170" height="26" rx="13" fill="#ECFDF5" stroke="#0F766E" stroke-width="1"/>
  <text x="215" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#0F766E">準備：数時間〜1日</text>

  <!-- STEP 2 カード -->
  <rect x="445" y="100" width="310" height="290" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="2.5"/>
  <!-- ステップナンバーバッジ -->
  <circle cx="600" cy="100" r="28" fill="#EAB308"/>
  <text x="600" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#0F766E">STEP</text>
  <text x="600" y="112" text-anchor="middle" font-size="18" font-weight="900" fill="#0F766E">2</text>
  <!-- アイコン：ハンドシェイク/外注 -->
  <rect x="563" y="145" width="75" height="50" rx="6" fill="#E6FFFA" stroke="#0F766E" stroke-width="2"/>
  <text x="600" y="177" text-anchor="middle" font-size="30">🤝</text>
  <!-- テキスト -->
  <text x="600" y="245" text-anchor="middle" font-size="15" font-weight="900" fill="#0F766E">スポット外注でPOC作成</text>
  <text x="600" y="268" text-anchor="middle" font-size="12" fill="#374151">ANKENでAI実装エンジニアに</text>
  <text x="600" y="286" text-anchor="middle" font-size="12" fill="#374151">「週末2日で動くものを」</text>
  <text x="600" y="304" text-anchor="middle" font-size="12" fill="#374151">という形でスポット発注する</text>
  <text x="600" y="330" text-anchor="middle" font-size="12" fill="#374151">→ 完璧なシステムではなく</text>
  <text x="600" y="348" text-anchor="middle" font-size="12" fill="#374151">「試せる試作品」を目指す</text>
  <!-- 期間タグ -->
  <rect x="515" y="368" width="170" height="26" rx="13" fill="#FEF9C3" stroke="#EAB308" stroke-width="1"/>
  <text x="600" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">実装：週末2日〜4日</text>

  <!-- STEP 3 カード -->
  <rect x="830" y="100" width="310" height="290" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="2.5"/>
  <!-- ステップナンバーバッジ -->
  <circle cx="985" cy="100" r="28" fill="#0F766E"/>
  <text x="985" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#EAB308">STEP</text>
  <text x="985" y="112" text-anchor="middle" font-size="18" font-weight="900" fill="#EAB308">3</text>
  <!-- アイコン：グラフ上昇 -->
  <rect x="948" y="145" width="75" height="50" rx="6" fill="#E6FFFA" stroke="#0F766E" stroke-width="2"/>
  <polyline points="960,183 972,170 984,175 996,160 1008,153" fill="none" stroke="#EAB308" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1008" cy="153" r="4" fill="#EAB308"/>
  <!-- テキスト -->
  <text x="985" y="245" text-anchor="middle" font-size="15" font-weight="900" fill="#0F766E">効果確認と横展開</text>
  <text x="985" y="268" text-anchor="middle" font-size="12" fill="#374151">2〜4週間実際の業務で試し</text>
  <text x="985" y="286" text-anchor="middle" font-size="12" fill="#374151">「時間短縮効果・使い勝手」を</text>
  <text x="985" y="304" text-anchor="middle" font-size="12" fill="#374151">社内で確認する</text>
  <text x="985" y="330" text-anchor="middle" font-size="12" fill="#374151">→ 効果確認後に本格実装 or</text>
  <text x="985" y="348" text-anchor="middle" font-size="12" fill="#374151">別業務領域へ横展開する</text>
  <!-- 期間タグ -->
  <rect x="900" y="368" width="170" height="26" rx="13" fill="#ECFDF5" stroke="#0F766E" stroke-width="1"/>
  <text x="985" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#0F766E">検証期間：2〜4週間</text>

  <!-- 全体フロー期間 -->
  <text x="600" y="445" text-anchor="middle" font-size="13" fill="#6B7280">最短1〜2ヶ月でAI活用の手ごたえが得られます</text>
</svg>
