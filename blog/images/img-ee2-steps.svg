<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowEE" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#C2542D"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="#FFFBF8"/>

  <text x="600" y="48" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="26" font-weight="700" fill="#2A211C">社内AIリテラシー研修の4ステップ</text>
  <text x="600" y="76" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#8C6A57">1回で終わらせず、循環的に振り返ることで定着率が高まる</text>

  <!-- connecting loop arrows (clockwise) -->
  <path d="M 660,150 A 220,220 0 0 1 800,330" fill="none" stroke="#E3B59C" stroke-width="3" marker-end="url(#arrowEE)"/>
  <path d="M 760,400 A 220,220 0 0 1 580,470" fill="none" stroke="#E3B59C" stroke-width="3" marker-end="url(#arrowEE)"/>
  <path d="M 440,440 A 220,220 0 0 1 360,260" fill="none" stroke="#E3B59C" stroke-width="3" marker-end="url(#arrowEE)"/>
  <path d="M 380,210 A 220,220 0 0 1 540,150" fill="none" stroke="#E3B59C" stroke-width="3" marker-end="url(#arrowEE)"/>

  <!-- center label -->
  <circle cx="600" cy="310" r="78" fill="#FDEEE6" stroke="#C2542D" stroke-width="2"/>
  <text x="600" y="304" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#9C3D1A">継続的に</text>
  <text x="600" y="326" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#9C3D1A">回す研修</text>

  <!-- Node 1: top -->
  <g>
    <circle cx="600" cy="130" r="64" fill="#2A211C"/>
    <text x="600" y="120" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#F0D9C9" font-weight="700">STEP 1</text>
    <text x="600" y="142" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">基本操作・</text>
    <text x="600" y="160" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">初期設定</text>
  </g>

  <!-- Node 2: right -->
  <g>
    <circle cx="860" cy="350" r="64" fill="#C2542D"/>
    <text x="860" y="340" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#FDEEE6" font-weight="700">STEP 2</text>
    <text x="860" y="362" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">プロンプトの</text>
    <text x="860" y="380" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">基本</text>
  </g>

  <!-- Node 3: bottom -->
  <g>
    <circle cx="600" cy="490" r="64" fill="#2A211C"/>
    <text x="600" y="480" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#F0D9C9" font-weight="700">STEP 3</text>
    <text x="600" y="502" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">情報セキュ</text>
    <text x="600" y="520" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">リティ</text>
  </g>

  <!-- Node 4: left -->
  <g>
    <circle cx="340" cy="350" r="64" fill="#C2542D"/>
    <text x="340" y="340" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#FDEEE6" font-weight="700">STEP 4</text>
    <text x="340" y="362" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">実践ワーク</text>
  </g>

</svg>
