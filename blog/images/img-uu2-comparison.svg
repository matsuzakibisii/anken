<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" width="1200" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&amp;display=swap');
      text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="22" font-weight="700" fill="#1E293B">AI分析 vs 人間レビュー｜特性比較</text>
  <line x1="200" y1="64" x2="1000" y2="64" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Header row -->
  <rect x="60" y="80" width="280" height="44" rx="8" fill="#F1F5F9"/>
  <text x="200" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#64748B">評価軸</text>

  <rect x="360" y="80" width="360" height="44" rx="8" fill="#7C3AED"/>
  <text x="540" y="107" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">AIレビュー</text>

  <rect x="740" y="80" width="400" height="44" rx="8" fill="#10B981"/>
  <text x="940" y="107" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">人間レビュー（先輩・上司）</text>

  <!-- Row 1: Speed -->
  <rect x="60" y="136" width="1080" height="58" rx="0" fill="#FAFAFA"/>
  <rect x="60" y="136" width="280" height="58" fill="#F8FAFC"/>
  <text x="200" y="161" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">⚡ スピード</text>
  <text x="200" y="181" text-anchor="middle" font-size="12" fill="#64748B">フィードバックを得る速さ</text>

  <rect x="360" y="136" width="360" height="58" fill="#F5F3FF"/>
  <text x="540" y="163" text-anchor="middle" font-size="22" fill="#7C3AED">●●●●●</text>
  <text x="540" y="184" text-anchor="middle" font-size="12" fill="#6D28D9">即時（数秒〜数分）</text>

  <rect x="740" y="136" width="400" height="58" fill="#F0FDF4"/>
  <text x="940" y="163" text-anchor="middle" font-size="22" fill="#10B981">●●○○○</text>
  <text x="940" y="184" text-anchor="middle" font-size="12" fill="#059669">数時間〜数日のスケジュール調整が必要</text>

  <!-- Row 2: Objectivity -->
  <rect x="60" y="194" width="280" height="58" fill="#FFFFFF"/>
  <text x="200" y="219" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">🎯 客観性</text>
  <text x="200" y="239" text-anchor="middle" font-size="12" fill="#64748B">感情・関係性によるバイアス</text>

  <rect x="360" y="194" width="360" height="58" fill="#F5F3FF"/>
  <text x="540" y="221" text-anchor="middle" font-size="22" fill="#7C3AED">●●●●●</text>
  <text x="540" y="242" text-anchor="middle" font-size="12" fill="#6D28D9">感情・忖度なし、完全中立</text>

  <rect x="740" y="194" width="400" height="58" fill="#F0FDF4"/>
  <text x="940" y="221" text-anchor="middle" font-size="22" fill="#10B981">●●●○○</text>
  <text x="940" y="242" text-anchor="middle" font-size="12" fill="#059669">関係性・忖度の影響を受ける場合あり</text>

  <!-- Row 3: Expertise -->
  <rect x="60" y="252" width="280" height="58" fill="#FAFAFA"/>
  <text x="200" y="277" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">🏆 業界専門知識</text>
  <text x="200" y="297" text-anchor="middle" font-size="12" fill="#64748B">業界固有の常識・事情</text>

  <rect x="360" y="252" width="360" height="58" fill="#F5F3FF"/>
  <text x="540" y="279" text-anchor="middle" font-size="22" fill="#CBD5E1">●●○○○</text>
  <text x="540" y="300" text-anchor="middle" font-size="12" fill="#6D28D9">一般知識は豊富・最新情報は要確認</text>

  <rect x="740" y="252" width="400" height="58" fill="#F0FDF4"/>
  <text x="940" y="279" text-anchor="middle" font-size="22" fill="#10B981">●●●●●</text>
  <text x="940" y="300" text-anchor="middle" font-size="12" fill="#059669">業界特有の文脈・慣習を踏まえた指摘</text>

  <!-- Row 4: Cost -->
  <rect x="60" y="310" width="280" height="58" fill="#FFFFFF"/>
  <text x="200" y="335" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">💰 コスト</text>
  <text x="200" y="355" text-anchor="middle" font-size="12" fill="#64748B">依頼にかかる費用・工数</text>

  <rect x="360" y="310" width="360" height="58" fill="#F5F3FF"/>
  <text x="540" y="337" text-anchor="middle" font-size="22" fill="#7C3AED">●●●●●</text>
  <text x="540" y="358" text-anchor="middle" font-size="12" fill="#6D28D9">ほぼ無料（AIサブスク代のみ）、何度でも</text>

  <rect x="740" y="310" width="400" height="58" fill="#F0FDF4"/>
  <text x="940" y="337" text-anchor="middle" font-size="22" fill="#CBD5E1">●●○○○</text>
  <text x="940" y="358" text-anchor="middle" font-size="12" fill="#059669">相手の工数・依頼しやすさの心理的コスト</text>

  <!-- Row 5: Context -->
  <rect x="60" y="368" width="280" height="58" fill="#FAFAFA"/>
  <text x="200" y="393" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">🏢 組織文脈の把握</text>
  <text x="200" y="413" text-anchor="middle" font-size="12" fill="#64748B">社内政治・文化への対応</text>

  <rect x="360" y="368" width="360" height="58" fill="#F5F3FF"/>
  <text x="540" y="395" text-anchor="middle" font-size="22" fill="#CBD5E1">●○○○○</text>
  <text x="540" y="416" text-anchor="middle" font-size="12" fill="#6D28D9">組織内の暗黙知・人間関係は読めない</text>

  <rect x="740" y="368" width="400" height="58" fill="#F0FDF4"/>
  <text x="940" y="395" text-anchor="middle" font-size="22" fill="#10B981">●●●●●</text>
  <text x="940" y="416" text-anchor="middle" font-size="12" fill="#059669">社内事情・相手の性格を踏まえた助言</text>

  <!-- Bottom note -->
  <rect x="60" y="438" width="1080" height="46" rx="8" fill="#EDE9FE"/>
  <text x="600" y="458" text-anchor="middle" font-size="13" fill="#5B21B6">💡 推奨：AIで「構成・論理・表現」の8割を仕上げ、重要な資料は専門家に残り2割を依頼するハイブリッドアプローチが最もコスパが高い</text>
  <text x="600" y="476" text-anchor="middle" font-size="12" fill="#6D28D9">● = 強い　○ = 弱い</text>
</svg>
