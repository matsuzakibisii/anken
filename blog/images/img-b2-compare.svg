<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"><rect width="1200" height="630" fill="#0f172a"/><text x="600" y="55" font-family="sans-serif" font-size="30" fill="#e2e8f0" text-anchor="middle" font-weight="bold">外注方法の比較</text><rect x="60" y="100" width="500" height="470" rx="20" fill="#7f1d1d"/><text x="310" y="160" font-family="sans-serif" font-size="28" fill="#fca5a5" text-anchor="middle" font-weight="bold">大手外注</text><text x="150" y="230" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" font-weight="normal">💰</text><text x="310" y="238" font-family="sans-serif" font-size="22" fill="#fecaca" text-anchor="middle" font-weight="normal">高額な固定費</text><text x="150" y="320" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" font-weight="normal">⏳</text><text x="310" y="328" font-family="sans-serif" font-size="22" fill="#fecaca" text-anchor="middle" font-weight="normal">契約まで1〜2ヶ月</text><text x="150" y="410" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" font-weight="normal">📋</text><text x="310" y="418" font-family="sans-serif" font-size="22" fill="#fecaca" text-anchor="middle" font-weight="normal">複雑な手続き</text><text x="150" y="500" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" font-weight="normal">🔒</text><text x="310" y="508" font-family="sans-serif" font-size="22" fill="#fecaca" text-anchor="middle" font-weight="normal">変更が難しい</text><rect x="640" y="100" width="500" height="470" rx="20" fill="#064e3b"/><text x="890" y="160" font-family="sans-serif" font-size="28" fill="#6ee7b7" text-anchor="middle" font-weight="bold">スポット発注</text><text x="730" y="230" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" font-weight="normal">✅</text><text x="890" y="238" font-family="sans-serif" font-size="22" fill="#d1fae5" text-anchor="middle" font-weight="normal">固定費ゼロ</text><text x="730" y="320" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" font-weight="normal">⚡</text><text x="890" y="328" font-family="sans-serif" font-size="22" fill="#d1fae5" text-anchor="middle" font-weight="normal">最短即日稼働</text><text x="730" y="410" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" font-weight="normal">📝</text><text x="890" y="418" font-family="sans-serif" font-size="22" fill="#d1fae5" text-anchor="middle" font-weight="normal">シンプルな依頼</text><text x="730" y="500" font-family="sans-serif" font-size="36" fill="#fff" text-anchor="middle" font-weight="normal">🔄</text><text x="890" y="508" font-family="sans-serif" font-size="22" fill="#d1fae5" text-anchor="middle" font-weight="normal">柔軟に調整可能</text><text x="600" y="600" font-family="sans-serif" font-size="18" fill="#475569" text-anchor="middle" font-weight="normal">あなたのプロジェクトに最適な選択を</text></svg>