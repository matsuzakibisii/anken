<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&amp;display=swap');
      text { font-family: 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#F9FAFB" rx="16"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="900" fill="#0B1221">ChatGPT・Claude・Gemini 機能比較</text>

  <!-- Header row -->
  <rect x="40" y="70" width="200" height="50" fill="#0B1221" rx="8"/>
  <text x="140" y="102" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">比較項目</text>

  <rect x="260" y="70" width="270" height="50" fill="#10A37F" rx="8"/>
  <text x="395" y="102" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">ChatGPT</text>

  <rect x="550" y="70" width="270" height="50" fill="#0B1221" rx="8"/>
  <text x="685" y="102" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">Claude</text>

  <rect x="840" y="70" width="270" height="50" fill="#4285F4" rx="8"/>
  <text x="975" y="102" text-anchor="middle" font-size="18" font-weight="900" fill="#FFFFFF">Gemini</text>

  <!-- Row 1: 日本語対応 -->
  <rect x="40" y="130" width="1120" height="56" fill="#FFFFFF" rx="6"/>
  <text x="140" y="164" text-anchor="middle" font-size="15" font-weight="700" fill="#0B1221">日本語対応</text>
  <rect x="285" y="142" width="220" height="32" fill="#F59E0B" rx="16"/>
  <text x="395" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">◎ 非常に自然</text>
  <rect x="575" y="142" width="220" height="32" fill="#F59E0B" rx="16"/>
  <text x="685" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">◎ 非常に自然</text>
  <rect x="865" y="142" width="220" height="32" fill="#E5E7EB" rx="16"/>
  <text x="975" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#6B7280">○ 良好</text>

  <!-- Row 2: 長文読解 -->
  <rect x="40" y="196" width="1120" height="56" fill="#F9FAFB" rx="6"/>
  <text x="140" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#0B1221">長文・資料読解</text>
  <rect x="285" y="208" width="220" height="32" fill="#E5E7EB" rx="16"/>
  <text x="395" y="229" text-anchor="middle" font-size="14" font-weight="700" fill="#6B7280">○ 良好</text>
  <rect x="575" y="208" width="220" height="32" fill="#F59E0B" rx="16"/>
  <text x="685" y="229" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">◎ 最強クラス</text>
  <rect x="865" y="208" width="220" height="32" fill="#E5E7EB" rx="16"/>
  <text x="975" y="229" text-anchor="middle" font-size="14" font-weight="700" fill="#6B7280">○ 良好</text>

  <!-- Row 3: 画像生成 -->
  <rect x="40" y="262" width="1120" height="56" fill="#FFFFFF" rx="6"/>
  <text x="140" y="296" text-anchor="middle" font-size="15" font-weight="700" fill="#0B1221">画像生成</text>
  <rect x="285" y="274" width="220" height="32" fill="#F59E0B" rx="16"/>
  <text x="395" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">◎ DALL-E内蔵</text>
  <rect x="575" y="274" width="220" height="32" fill="#D1D5DB" rx="16"/>
  <text x="685" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#9CA3AF">△ 非対応</text>
  <rect x="865" y="274" width="220" height="32" fill="#F59E0B" rx="16"/>
  <text x="975" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">◎ Imagen内蔵</text>

  <!-- Row 4: Web検索 -->
  <rect x="40" y="328" width="1120" height="56" fill="#F9FAFB" rx="6"/>
  <text x="140" y="362" text-anchor="middle" font-size="15" font-weight="700" fill="#0B1221">リアルタイム検索</text>
  <rect x="285" y="340" width="220" height="32" fill="#F59E0B" rx="16"/>
  <text x="395" y="361" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">◎ 対応</text>
  <rect x="575" y="340" width="220" height="32" fill="#E5E7EB" rx="16"/>
  <text x="685" y="361" text-anchor="middle" font-size="14" font-weight="700" fill="#6B7280">○ 一部対応</text>
  <rect x="865" y="340" width="220" height="32" fill="#F59E0B" rx="16"/>
  <text x="975" y="361" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">◎ Google検索連携</text>

  <!-- Row 5: 無料プラン -->
  <rect x="40" y="394" width="1120" height="56" fill="#FFFFFF" rx="6"/>
  <text x="140" y="428" text-anchor="middle" font-size="15" font-weight="700" fill="#0B1221">無料プラン</text>
  <rect x="285" y="406" width="220" height="32" fill="#E5E7EB" rx="16"/>
  <text x="395" y="427" text-anchor="middle" font-size="14" font-weight="700" fill="#6B7280">○ GPT-4o mini</text>
  <rect x="575" y="406" width="220" height="32" fill="#E5E7EB" rx="16"/>
  <text x="685" y="427" text-anchor="middle" font-size="14" font-weight="700" fill="#6B7280">○ Claude Haiku</text>
  <rect x="865" y="406" width="220" height="32" fill="#F59E0B" rx="16"/>
  <text x="975" y="427" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">◎ 最も充実</text>

  <!-- Legend -->
  <rect x="285" y="464" width="18" height="18" fill="#F59E0B" rx="4"/>
  <text x="310" y="477" font-size="13" fill="#374151">◎ 優秀</text>
  <rect x="410" y="464" width="18" height="18" fill="#E5E7EB" rx="4"/>
  <text x="435" y="477" font-size="13" fill="#374151">○ 良好</text>
  <rect x="510" y="464" width="18" height="18" fill="#D1D5DB" rx="4"/>
  <text x="535" y="477" font-size="13" fill="#374151">△ 非対応・限定的</text>
</svg>
