<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <rect width="1200" height="500" fill="#F0F4FF"/>

  <!-- タイトル -->
  <text x="600" y="48" text-anchor="middle" font-size="22" font-weight="900" fill="#1E3A8A">建築・CAD図面のAI活用 4パターン比較</text>

  <!-- カード1：図面AI-OCR -->
  <rect x="30" y="75" width="270" height="380" rx="14" fill="#ffffff" stroke="#1E40AF" stroke-width="2"/>
  <rect x="30" y="75" width="270" height="56" rx="14" fill="#1E40AF"/>
  <rect x="30" y="103" width="270" height="28" rx="0" fill="#1E40AF"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">パターン①</text>
  <text x="165" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#BFD9FF">図面AI-OCR</text>

  <!-- アイコン：スキャン -->
  <rect x="130" y="148" width="70" height="56" rx="6" fill="none" stroke="#1E40AF" stroke-width="2"/>
  <line x1="142" y1="162" x2="188" y2="162" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="142" y1="170" x2="188" y2="170" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="142" y1="178" x2="174" y2="178" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="142" y1="186" x2="178" y2="186" stroke="#1E40AF" stroke-width="1.5"/>
  <path d="M192 148 L200 156 L192 156 Z" fill="#D97706"/>
  <text x="165" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">紙図面・PDFから</text>
  <text x="165" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">寸法・部材名を自動抽出</text>
  <line x1="60" y1="260" x2="270" y2="260" stroke="#E5E7EB" stroke-width="1"/>
  <text x="165" y="284" text-anchor="middle" font-size="11" fill="#374151">対象：リノベ・改修案件</text>
  <text x="165" y="304" text-anchor="middle" font-size="11" fill="#374151">精度：チューニング後90%+</text>
  <rect x="70" y="322" width="190" height="32" rx="8" fill="#EFF6FF"/>
  <text x="165" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">予算目安：30〜60万円</text>
  <rect x="70" y="366" width="190" height="32" rx="8" fill="#FEF3C7"/>
  <text x="165" y="387" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">期間：3〜4週間</text>

  <!-- カード2：数量拾い出し -->
  <rect x="320" y="75" width="270" height="380" rx="14" fill="#ffffff" stroke="#D97706" stroke-width="2.5"/>
  <rect x="320" y="75" width="270" height="56" rx="14" fill="#D97706"/>
  <rect x="320" y="103" width="270" height="28" rx="0" fill="#D97706"/>
  <text x="455" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">パターン②　⭐ 最初の1件に最適</text>
  <text x="455" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#FEF3C7">数量拾い出し自動化</text>

  <!-- アイコン：計算 -->
  <rect x="420" y="148" width="70" height="56" rx="6" fill="none" stroke="#D97706" stroke-width="2"/>
  <text x="455" y="168" text-anchor="middle" font-size="18" font-weight="900" fill="#D97706">∑</text>
  <text x="455" y="190" text-anchor="middle" font-size="11" fill="#D97706">AUTO</text>
  <text x="455" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">CADデータから面積・延長・</text>
  <text x="455" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">部材数をExcelへ自動出力</text>
  <line x1="350" y1="260" x2="560" y2="260" stroke="#E5E7EB" stroke-width="1"/>
  <text x="455" y="284" text-anchor="middle" font-size="11" fill="#374151">削減効果：作業時間80〜90%減</text>
  <text x="455" y="304" text-anchor="middle" font-size="11" fill="#374151">対象：見積もり業務全般</text>
  <rect x="360" y="322" width="190" height="32" rx="8" fill="#FEF3C7"/>
  <text x="455" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">予算目安：40〜70万円</text>
  <rect x="360" y="366" width="190" height="32" rx="8" fill="#EFF6FF"/>
  <text x="455" y="387" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">期間：3〜4週間</text>

  <!-- カード3：2D→3D -->
  <rect x="610" y="75" width="270" height="380" rx="14" fill="#ffffff" stroke="#1E40AF" stroke-width="2"/>
  <rect x="610" y="75" width="270" height="56" rx="14" fill="#1E40AF"/>
  <rect x="610" y="103" width="270" height="28" rx="0" fill="#1E40AF"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">パターン③</text>
  <text x="745" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#BFD9FF">2D→3Dモデル・パース生成</text>

  <!-- アイコン：3D -->
  <polygon points="745,148 720,168 745,188 770,168" fill="none" stroke="#1E40AF" stroke-width="2"/>
  <line x1="745" y1="148" x2="745" y2="188" stroke="#1E40AF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="720" y1="168" x2="770" y2="168" stroke="#1E40AF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="745" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">平面図から3Dモデル・</text>
  <text x="745" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">パースをAI自動生成</text>
  <line x1="640" y1="260" x2="850" y2="260" stroke="#E5E7EB" stroke-width="1"/>
  <text x="745" y="284" text-anchor="middle" font-size="11" fill="#374151">従来費用：10〜30万円/件→激減</text>
  <text x="745" y="304" text-anchor="middle" font-size="11" fill="#374151">対象：販促パース・提案資料</text>
  <rect x="650" y="322" width="190" height="32" rx="8" fill="#EFF6FF"/>
  <text x="745" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">予算目安：70〜100万円</text>
  <rect x="650" y="366" width="190" height="32" rx="8" fill="#FEF3C7"/>
  <text x="745" y="387" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">期間：4〜6週間</text>

  <!-- カード4：図面管理RAG -->
  <rect x="900" y="75" width="270" height="380" rx="14" fill="#ffffff" stroke="#1E40AF" stroke-width="2"/>
  <rect x="900" y="75" width="270" height="56" rx="14" fill="#1E40AF"/>
  <rect x="900" y="103" width="270" height="28" rx="0" fill="#1E40AF"/>
  <text x="1035" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">パターン④</text>
  <text x="1035" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#BFD9FF">BIM/図面管理AI検索</text>

  <!-- アイコン：検索 -->
  <circle cx="1035" cy="168" r="18" fill="none" stroke="#1E40AF" stroke-width="2"/>
  <line x1="1048" y1="181" x2="1058" y2="191" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="1035" y="173" text-anchor="middle" font-size="12" fill="#1E40AF">AI</text>
  <text x="1035" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">社内図面ライブラリを</text>
  <text x="1035" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">自然言語で即時検索</text>
  <line x1="930" y1="260" x2="1140" y2="260" stroke="#E5E7EB" stroke-width="1"/>
  <text x="1035" y="284" text-anchor="middle" font-size="11" fill="#374151">検索：40分→3分以内</text>
  <text x="1035" y="304" text-anchor="middle" font-size="11" fill="#374151">対象：大量図面を抱える組織</text>
  <rect x="940" y="322" width="190" height="32" rx="8" fill="#EFF6FF"/>
  <text x="1035" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">予算目安：60〜100万円</text>
  <rect x="940" y="366" width="190" height="32" rx="8" fill="#FEF3C7"/>
  <text x="1035" y="387" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">期間：4〜6週間</text>

  <!-- 出典 -->
  <text x="600" y="486" text-anchor="middle" font-size="10" fill="#9CA3AF">ANKEN編集部調査（2026年7月）| スポット外注での建築・CAD図面AI活用 費用・期間は案件規模により異なります</text>
</svg>
