<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&amp;display=swap');
      text { font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="#F8F9FA" rx="16"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="22" font-weight="900" fill="#1A1A2E">Gemini for Google Workspace ｜ 4アプリ別 主な活用機能</text>

  <!-- Card 1: Gmail -->
  <rect x="40" y="82" width="258" height="390" rx="16" fill="#FFFFFF" stroke="#EA4335" stroke-width="3"/>
  <!-- Header -->
  <rect x="40" y="82" width="258" height="62" rx="16" fill="#EA4335"/>
  <rect x="40" y="122" width="258" height="22" fill="#EA4335"/>
  <!-- Gmail icon circle -->
  <circle cx="78" cy="113" r="18" fill="#FFFFFF" opacity="0.25"/>
  <text x="78" y="119" text-anchor="middle" font-size="18" fill="#FFFFFF">✉</text>
  <text x="169" y="110" text-anchor="middle" font-size="17" font-weight="900" fill="#FFFFFF">Gmail</text>
  <text x="169" y="130" text-anchor="middle" font-size="12" fill="#FFCDD2">メール作成・整理を効率化</text>

  <!-- Gmail features -->
  <rect x="60" y="162" width="218" height="44" rx="8" fill="#FFF5F5"/>
  <text x="80" y="179" font-size="12" font-weight="700" fill="#C62828">🤖 メール文章を自動生成</text>
  <text x="80" y="196" font-size="11" fill="#555">件名・状況を入力するだけ</text>

  <rect x="60" y="216" width="218" height="44" rx="8" fill="#FFF5F5"/>
  <text x="80" y="233" font-size="12" font-weight="700" fill="#C62828">📝 返信文を1クリックで作成</text>
  <text x="80" y="250" font-size="11" fill="#555">受信メールを読んで自動提案</text>

  <rect x="60" y="270" width="218" height="44" rx="8" fill="#FFF5F5"/>
  <text x="80" y="287" font-size="12" font-weight="700" fill="#C62828">📋 長いスレッドをAIで要約</text>
  <text x="80" y="304" font-size="11" fill="#555">「Summarize」で要点を即把握</text>

  <rect x="60" y="324" width="218" height="44" rx="8" fill="#FFF5F5"/>
  <text x="80" y="341" font-size="12" font-weight="700" fill="#C62828">🌐 翻訳＆トーン調整</text>
  <text x="80" y="358" font-size="11" fill="#555">文章の丁寧さ・簡潔さを変更</text>

  <rect x="60" y="378" width="218" height="44" rx="8" fill="#FFF5F5"/>
  <text x="80" y="395" font-size="12" font-weight="700" fill="#C62828">🔍 メール内容を検索・整理</text>
  <text x="80" y="412" font-size="11" fill="#555">重要メールをAIが分類提案</text>

  <!-- Card 2: Google Docs -->
  <rect x="320" y="82" width="258" height="390" rx="16" fill="#FFFFFF" stroke="#1A73E8" stroke-width="3"/>
  <rect x="320" y="82" width="258" height="62" rx="16" fill="#1A73E8"/>
  <rect x="320" y="122" width="258" height="22" fill="#1A73E8"/>
  <circle cx="358" cy="113" r="18" fill="#FFFFFF" opacity="0.25"/>
  <text x="358" y="119" text-anchor="middle" font-size="18" fill="#FFFFFF">📄</text>
  <text x="449" y="110" text-anchor="middle" font-size="17" font-weight="900" fill="#FFFFFF">Google Docs</text>
  <text x="449" y="130" text-anchor="middle" font-size="12" fill="#BBDEFB">文書作成・編集をAIで加速</text>

  <rect x="340" y="162" width="218" height="44" rx="8" fill="#F0F8FF"/>
  <text x="360" y="179" font-size="12" font-weight="700" fill="#1565C0">✍️ AIで文書の叩き台を生成</text>
  <text x="360" y="196" font-size="11" fill="#555">テーマ・要件を入力して下書き作成</text>

  <rect x="340" y="216" width="218" height="44" rx="8" fill="#F0F8FF"/>
  <text x="360" y="233" font-size="12" font-weight="700" fill="#1565C0">📑 長文ドキュメントを要約</text>
  <text x="360" y="250" font-size="11" fill="#555">報告書・議事録を即座にサマリー化</text>

  <rect x="340" y="270" width="218" height="44" rx="8" fill="#F0F8FF"/>
  <text x="360" y="287" font-size="12" font-weight="700" fill="#1565C0">✏️ 文章の品質を改善</text>
  <text x="360" y="304" font-size="11" fill="#555">誤字修正・文体統一・表現強化</text>

  <rect x="340" y="324" width="218" height="44" rx="8" fill="#F0F8FF"/>
  <text x="360" y="341" font-size="12" font-weight="700" fill="#1565C0">🌍 多言語翻訳に対応</text>
  <text x="360" y="358" font-size="11" fill="#555">英語・中国語など多言語に変換</text>

  <rect x="340" y="378" width="218" height="44" rx="8" fill="#F0F8FF"/>
  <text x="360" y="395" font-size="12" font-weight="700" fill="#1565C0">💡 追加リサーチをAIに依頼</text>
  <text x="360" y="412" font-size="11" fill="#555">関連情報の検索・引用元の提案</text>

  <!-- Card 3: Google Sheets -->
  <rect x="600" y="82" width="258" height="390" rx="16" fill="#FFFFFF" stroke="#34A853" stroke-width="3"/>
  <rect x="600" y="82" width="258" height="62" rx="16" fill="#34A853"/>
  <rect x="600" y="122" width="258" height="22" fill="#34A853"/>
  <circle cx="638" cy="113" r="18" fill="#FFFFFF" opacity="0.25"/>
  <text x="638" y="119" text-anchor="middle" font-size="18" fill="#FFFFFF">📊</text>
  <text x="729" y="110" text-anchor="middle" font-size="17" font-weight="900" fill="#FFFFFF">Google Sheets</text>
  <text x="729" y="130" text-anchor="middle" font-size="12" fill="#C8E6C9">データ作業の負担を大幅削減</text>

  <rect x="620" y="162" width="218" height="44" rx="8" fill="#F1FFF5"/>
  <text x="640" y="179" font-size="12" font-weight="700" fill="#1B5E20">🔢 数式・関数をAIが提案</text>
  <text x="640" y="196" font-size="11" fill="#555">やりたいことを日本語で入力するだけ</text>

  <rect x="620" y="216" width="218" height="44" rx="8" fill="#F1FFF5"/>
  <text x="640" y="233" font-size="12" font-weight="700" fill="#1B5E20">📈 データ傾向を自動分析</text>
  <text x="640" y="250" font-size="11" fill="#555">トレンド・異常値をAIが発見</text>

  <rect x="620" y="270" width="218" height="44" rx="8" fill="#F1FFF5"/>
  <text x="640" y="287" font-size="12" font-weight="700" fill="#1B5E20">🏷️ データ分類・タグ付け</text>
  <text x="640" y="304" font-size="11" fill="#555">リストをAIでカテゴリ分け</text>

  <rect x="620" y="324" width="218" height="44" rx="8" fill="#F1FFF5"/>
  <text x="640" y="341" font-size="12" font-weight="700" fill="#1B5E20">📋 表のフォーマット整形</text>
  <text x="640" y="358" font-size="11" fill="#555">バラバラなデータを統一フォーマットへ</text>

  <rect x="620" y="378" width="218" height="44" rx="8" fill="#F1FFF5"/>
  <text x="640" y="395" font-size="12" font-weight="700" fill="#1B5E20">💬 自然言語でデータ質問</text>
  <text x="640" y="412" font-size="11" fill="#555">「今月の売上上位5件は？」など</text>

  <!-- Card 4: Google Meet -->
  <rect x="880" y="82" width="280" height="390" rx="16" fill="#FFFFFF" stroke="#FBBC04" stroke-width="3"/>
  <rect x="880" y="82" width="280" height="62" rx="16" fill="#FBBC04"/>
  <rect x="880" y="122" width="280" height="22" fill="#FBBC04"/>
  <circle cx="918" cy="113" r="18" fill="#FFFFFF" opacity="0.25"/>
  <text x="918" y="119" text-anchor="middle" font-size="18" fill="#FFFFFF">📹</text>
  <text x="1020" y="110" text-anchor="middle" font-size="17" font-weight="900" fill="#1A1A2E">Google Meet</text>
  <text x="1020" y="130" text-anchor="middle" font-size="12" fill="#5D4037">会議の生産性をAIで底上げ</text>

  <rect x="900" y="162" width="240" height="44" rx="8" fill="#FFFDE7"/>
  <text x="920" y="179" font-size="12" font-weight="700" fill="#E65100">📝 議事録を自動生成</text>
  <text x="920" y="196" font-size="11" fill="#555">会議中の発言をリアルタイムで記録</text>

  <rect x="900" y="216" width="240" height="44" rx="8" fill="#FFFDE7"/>
  <text x="920" y="233" font-size="12" font-weight="700" fill="#E65100">✅ アクションアイテムを抽出</text>
  <text x="920" y="250" font-size="11" fill="#555">ToDoと担当者をAIが整理</text>

  <rect x="900" y="270" width="240" height="44" rx="8" fill="#FFFDE7"/>
  <text x="920" y="287" font-size="12" font-weight="700" fill="#E65100">🌏 リアルタイム字幕・翻訳</text>
  <text x="920" y="304" font-size="11" fill="#555">多言語会議でも内容を即把握</text>

  <rect x="900" y="324" width="240" height="44" rx="8" fill="#FFFDE7"/>
  <text x="920" y="341" font-size="12" font-weight="700" fill="#E65100">🎯 会議サマリーをDocsに保存</text>
  <text x="920" y="358" font-size="11" fill="#555">終了後に要約・議事録を自動出力</text>

  <rect x="900" y="378" width="240" height="44" rx="8" fill="#FFFDE7"/>
  <text x="920" y="395" font-size="12" font-weight="700" fill="#E65100">🔕 参加できない会議も把握</text>
  <text x="920" y="412" font-size="11" fill="#555">録画＋Gemini要約で後から確認</text>

  <!-- Footer note -->
  <text x="600" y="492" text-anchor="middle" font-size="11" fill="#888">※機能の一部はGoogle Workspace Business Starter以上のプランで利用可能。2026年7月時点の情報。</text>
</svg>
