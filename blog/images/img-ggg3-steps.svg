<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <!-- Background -->
  <rect width="1200" height="480" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="48" font-size="22" font-weight="900" fill="#1e1e2e" text-anchor="middle">AI検索（AIO/GEO）対応の3ステップ</text>

  <!-- Step 1 -->
  <rect x="50" y="80" width="330" height="350" rx="16" fill="#fff" stroke="#BE185D" stroke-width="2"/>
  <!-- Step badge -->
  <circle cx="215" cy="80" r="28" fill="#BE185D"/>
  <text x="215" y="74" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">STEP</text>
  <text x="215" y="93" font-size="18" font-weight="900" fill="#fff" text-anchor="middle">1</text>

  <!-- Step 1 icon: checklist -->
  <rect x="170" y="118" width="90" height="70" rx="8" fill="#fdf2f8"/>
  <line x1="182" y1="135" x2="248" y2="135" stroke="#BE185D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="182" y1="150" x2="248" y2="150" stroke="#BE185D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="182" y1="165" x2="230" y2="165" stroke="#BE185D" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="262" cy="135" r="5" fill="#BE185D"/>
  <circle cx="262" cy="150" r="5" fill="#BE185D"/>

  <text x="215" y="215" font-size="16" font-weight="900" fill="#BE185D" text-anchor="middle">情報の棚卸し</text>
  <text x="215" y="240" font-size="13" font-weight="700" fill="#1e1e2e" text-anchor="middle">自社情報を</text>
  <text x="215" y="260" font-size="13" font-weight="700" fill="#1e1e2e" text-anchor="middle">「問い×回答」形式に</text>

  <line x1="80" y1="290" x2="350" y2="290" stroke="#e5e7eb" stroke-width="1"/>

  <text x="215" y="318" font-size="12" fill="#6b7280" text-anchor="middle">・製品定義・価格・実績を整理</text>
  <text x="215" y="338" font-size="12" fill="#6b7280" text-anchor="middle">・30〜80字の直接回答を準備</text>
  <text x="215" y="358" font-size="12" fill="#6b7280" text-anchor="middle">・数値データを明確に記録</text>
  <text x="215" y="378" font-size="12" fill="#6b7280" text-anchor="middle">・競合との違いも言語化</text>
  <text x="215" y="398" font-size="12" font-weight="700" fill="#BE185D" text-anchor="middle">所要時間：1〜2日</text>

  <!-- Arrow 1→2 -->
  <polygon points="420,245 440,255 420,265" fill="#BE185D"/>
  <line x1="385" y1="255" x2="438" y2="255" stroke="#BE185D" stroke-width="2.5"/>

  <!-- Step 2 -->
  <rect x="445" y="80" width="330" height="350" rx="16" fill="#fff" stroke="#0891B2" stroke-width="2"/>
  <!-- Step badge -->
  <circle cx="610" cy="80" r="28" fill="#0891B2"/>
  <text x="610" y="74" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">STEP</text>
  <text x="610" y="93" font-size="18" font-weight="900" fill="#fff" text-anchor="middle">2</text>

  <!-- Step 2 icon: document with highlight -->
  <rect x="565" y="118" width="90" height="70" rx="8" fill="#ecfeff"/>
  <rect x="577" y="130" width="66" height="10" rx="3" fill="#0891B2"/>
  <line x1="577" y1="152" x2="643" y2="152" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="577" y1="164" x2="630" y2="164" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="577" y1="176" x2="643" y2="176" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>

  <text x="610" y="215" font-size="16" font-weight="900" fill="#0891B2" text-anchor="middle">コンテンツ設計</text>
  <text x="610" y="240" font-size="13" font-weight="700" fill="#1e1e2e" text-anchor="middle">AI引用対応の</text>
  <text x="610" y="260" font-size="13" font-weight="700" fill="#1e1e2e" text-anchor="middle">ページ構成に整える</text>

  <line x1="475" y1="290" x2="745" y2="290" stroke="#e5e7eb" stroke-width="1"/>

  <text x="610" y="318" font-size="12" fill="#6b7280" text-anchor="middle">・冒頭を直接回答型リード文に</text>
  <text x="610" y="338" font-size="12" fill="#6b7280" text-anchor="middle">・FAQセクション（3〜5問）追加</text>
  <text x="610" y="358" font-size="12" fill="#6b7280" text-anchor="middle">・定義ブロックを視覚化</text>
  <text x="610" y="378" font-size="12" fill="#6b7280" text-anchor="middle">・数値入り事例を本文に掲載</text>
  <text x="610" y="398" font-size="12" font-weight="700" fill="#0891B2" text-anchor="middle">所要時間：3〜5日（内製）</text>

  <!-- Arrow 2→3 -->
  <polygon points="815,245 835,255 815,265" fill="#0891B2"/>
  <line x1="778" y1="255" x2="833" y2="255" stroke="#0891B2" stroke-width="2.5"/>

  <!-- Step 3 -->
  <rect x="840" y="80" width="330" height="350" rx="16" fill="#fff" stroke="#BE185D" stroke-width="2"/>
  <!-- Step badge: gradient feel using two circles -->
  <circle cx="1005" cy="80" r="28" fill="#BE185D"/>
  <circle cx="1005" cy="80" r="16" fill="#0891B2"/>
  <text x="1005" y="74" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">STEP</text>
  <text x="1005" y="93" font-size="18" font-weight="900" fill="#fff" text-anchor="middle">3</text>

  <!-- Step 3 icon: code/gear -->
  <rect x="960" y="118" width="90" height="70" rx="8" fill="#fdf2f8"/>
  <text x="1005" y="168" font-size="30" fill="#BE185D" text-anchor="middle">&#60;/&#62;</text>

  <text x="1005" y="215" font-size="16" font-weight="900" fill="#BE185D" text-anchor="middle">技術実装</text>
  <text x="1005" y="240" font-size="13" font-weight="700" fill="#1e1e2e" text-anchor="middle">AIクローラーに</text>
  <text x="1005" y="260" font-size="13" font-weight="700" fill="#1e1e2e" text-anchor="middle">確実に届ける仕組みを作る</text>

  <line x1="870" y1="290" x2="1140" y2="290" stroke="#e5e7eb" stroke-width="1"/>

  <text x="1005" y="318" font-size="12" fill="#6b7280" text-anchor="middle">・FAQPage JSON-LD 実装</text>
  <text x="1005" y="338" font-size="12" fill="#6b7280" text-anchor="middle">・llms.txt 作成・設置</text>
  <text x="1005" y="358" font-size="12" fill="#6b7280" text-anchor="middle">・robots.txt AIクローラー許可確認</text>
  <text x="1005" y="378" font-size="12" fill="#6b7280" text-anchor="middle">・sitemap.xml 更新</text>
  <text x="1005" y="398" font-size="12" font-weight="700" fill="#BE185D" text-anchor="middle">スポット外注で3〜15万円が目安</text>

  <!-- Caption -->
  <text x="600" y="458" font-size="12" fill="#9ca3af" text-anchor="middle">STEP3の技術実装はスポット外注で単発依頼可能。STEP1・2は社内の担当者が主導するのが効果的。</text>
</svg>
