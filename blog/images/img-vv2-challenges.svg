<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans JP', sans-serif">
  <!-- Background -->
  <rect width="1200" height="500" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="22" font-weight="900" fill="#1E293B">建設業・製造業 AI導入3大課題とスポット外注による解決策</text>

  <!-- Divider under title -->
  <line x1="200" y1="68" x2="1000" y2="68" stroke="#C2410C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- === Card 1: IT人材不足 === -->
  <!-- Card background -->
  <rect x="40" y="90" width="340" height="380" rx="16" ry="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Top accent bar -->
  <rect x="40" y="90" width="340" height="8" rx="8" ry="8" fill="#C2410C"/>
  <rect x="40" y="94" width="340" height="4" fill="#C2410C"/>

  <!-- Icon circle -->
  <circle cx="210" cy="155" r="36" fill="#FFF1EE"/>
  <!-- Person icon -->
  <circle cx="210" cy="143" r="13" fill="#C2410C"/>
  <path d="M183 181 Q183 163 210 163 Q237 163 237 181" fill="#C2410C"/>
  <!-- X mark -->
  <circle cx="238" cy="133" r="13" fill="#EF4444"/>
  <line x1="232" y1="127" x2="244" y2="139" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="244" y1="127" x2="232" y2="139" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Card 1 heading -->
  <text x="210" y="216" text-anchor="middle" font-size="17" font-weight="900" fill="#C2410C">課題①</text>
  <text x="210" y="240" text-anchor="middle" font-size="19" font-weight="900" fill="#1E293B">IT・AI人材が</text>
  <text x="210" y="264" text-anchor="middle" font-size="19" font-weight="900" fill="#1E293B">社内にいない</text>

  <line x1="70" y1="280" x2="350" y2="280" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Arrow -->
  <text x="210" y="308" text-anchor="middle" font-size="26" fill="#0369A1">↓</text>
  <text x="210" y="322" text-anchor="middle" font-size="12" fill="#64748B">スポット外注の解決策</text>

  <!-- Solution text -->
  <text x="210" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#0369A1">業種実績のある</text>
  <text x="210" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#0369A1">AIエンジニアを</text>
  <text x="210" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#0369A1">1案件から依頼可能</text>
  <text x="210" y="418" text-anchor="middle" font-size="12" fill="#64748B">採用コスト・育成期間ゼロ</text>
  <text x="210" y="436" text-anchor="middle" font-size="12" fill="#64748B">即日〜翌週稼働</text>

  <!-- === Card 2: 予算制約 === -->
  <rect x="430" y="90" width="340" height="380" rx="16" ry="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="430" y="90" width="340" height="8" rx="8" ry="8" fill="#0369A1"/>
  <rect x="430" y="94" width="340" height="4" fill="#0369A1"/>

  <!-- Icon: budget / coin -->
  <circle cx="600" cy="155" r="36" fill="#EFF6FF"/>
  <!-- Yen symbol -->
  <text x="600" y="166" text-anchor="middle" font-size="34" font-weight="900" fill="#0369A1">¥</text>
  <!-- Down arrow on budget -->
  <circle cx="628" cy="133" r="13" fill="#EF4444"/>
  <text x="628" y="139" text-anchor="middle" font-size="16" font-weight="900" fill="white">↓</text>

  <text x="600" y="216" text-anchor="middle" font-size="17" font-weight="900" fill="#0369A1">課題②</text>
  <text x="600" y="240" text-anchor="middle" font-size="19" font-weight="900" fill="#1E293B">PoC費用が</text>
  <text x="600" y="264" text-anchor="middle" font-size="19" font-weight="900" fill="#1E293B">数百万円かかる</text>

  <line x1="460" y1="280" x2="740" y2="280" stroke="#E2E8F0" stroke-width="1"/>

  <text x="600" y="308" text-anchor="middle" font-size="26" fill="#C2410C">↓</text>
  <text x="600" y="322" text-anchor="middle" font-size="12" fill="#64748B">スポット外注の解決策</text>

  <text x="600" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#C2410C">30〜80万円から</text>
  <text x="600" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#C2410C">PoC着手できる</text>
  <text x="600" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#C2410C">タスク単位で依頼</text>
  <text x="600" y="418" text-anchor="middle" font-size="12" fill="#64748B">月額固定費ゼロ</text>
  <text x="600" y="436" text-anchor="middle" font-size="12" fill="#64748B">成果確認後に拡大投資</text>

  <!-- === Card 3: 現場定着 === -->
  <rect x="820" y="90" width="340" height="380" rx="16" ry="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="820" y="90" width="340" height="8" rx="8" ry="8" fill="#1E293B"/>
  <rect x="820" y="94" width="340" height="4" fill="#1E293B"/>

  <!-- Icon: factory/gear -->
  <circle cx="990" cy="155" r="36" fill="#F1F5F9"/>
  <!-- Gear shape simplified -->
  <circle cx="990" cy="155" r="18" fill="none" stroke="#475569" stroke-width="5"/>
  <circle cx="990" cy="155" r="7" fill="#475569"/>
  <!-- Gear teeth -->
  <rect x="987" y="130" width="6" height="8" rx="2" fill="#475569"/>
  <rect x="987" y="172" width="6" height="8" rx="2" fill="#475569"/>
  <rect x="965" y="152" width="8" height="6" rx="2" fill="#475569"/>
  <rect x="1007" y="152" width="8" height="6" rx="2" fill="#475569"/>
  <!-- Warning badge -->
  <circle cx="1018" cy="133" r="13" fill="#F59E0B"/>
  <text x="1018" y="139" text-anchor="middle" font-size="15" font-weight="900" fill="white">!</text>

  <text x="990" y="216" text-anchor="middle" font-size="17" font-weight="900" fill="#475569">課題③</text>
  <text x="990" y="240" text-anchor="middle" font-size="19" font-weight="900" fill="#1E293B">現場が使わず</text>
  <text x="990" y="264" text-anchor="middle" font-size="19" font-weight="900" fill="#1E293B">定着しない</text>

  <line x1="850" y1="280" x2="1130" y2="280" stroke="#E2E8F0" stroke-width="1"/>

  <text x="990" y="308" text-anchor="middle" font-size="26" fill="#C2410C">↓</text>
  <text x="990" y="322" text-anchor="middle" font-size="12" fill="#64748B">スポット外注の解決策</text>

  <text x="990" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">現場担当者を</text>
  <text x="990" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">初日から巻き込む</text>
  <text x="990" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">3週間PoC設計</text>
  <text x="990" y="418" text-anchor="middle" font-size="12" fill="#64748B">フィードバック反映が迅速</text>
  <text x="990" y="436" text-anchor="middle" font-size="12" fill="#64748B">「自分たちのツール」に育てる</text>

  <!-- Footer note -->
  <text x="600" y="490" text-anchor="middle" font-size="11" fill="#94A3B8">ANKEN編集部作成 © 2026</text>
</svg>
