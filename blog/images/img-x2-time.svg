<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" font-family="'Noto Sans JP', sans-serif">
  <rect x="0" y="0" width="1200" height="500" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="600" y="56" text-anchor="middle" font-size="30" font-weight="900" fill="#0F172A">議事録作成にかかる時間の比較</text>
  <text x="600" y="86" text-anchor="middle" font-size="16" fill="#64748B">1時間の会議1回あたり（自力作成 vs AI活用）</text>

  <!-- Baseline -->
  <line x1="260" y1="430" x2="1080" y2="430" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Scale labels -->
  <text x="260" y="452" text-anchor="middle" font-size="13" fill="#94A3B8">0分</text>
  <text x="586" y="452" text-anchor="middle" font-size="13" fill="#94A3B8">30分</text>
  <text x="913" y="452" text-anchor="middle" font-size="13" fill="#94A3B8">60分</text>

  <!-- Bar 1: 自力作成 (55 min) -->
  <text x="260" y="180" font-size="18" font-weight="700" fill="#0F172A">自力で作成する場合</text>
  <rect x="260" y="196" width="600" height="48" rx="8" fill="#FDE9E7"/>
  <rect x="260" y="196" width="598" height="48" rx="8" fill="#FB7185"/>
  <text x="878" y="228" font-size="20" font-weight="900" fill="#0F172A">約55分</text>
  <text x="260" y="262" font-size="13" fill="#64748B">録音の聞き直し30〜40分＋文章整理15〜20分</text>

  <!-- Bar 2: AI活用 (10 min) -->
  <text x="260" y="320" font-size="18" font-weight="700" fill="#0F172A">AIで自動化する場合</text>
  <rect x="260" y="336" width="600" height="48" rx="8" fill="#CFF7F0"/>
  <rect x="260" y="336" width="109" height="48" rx="8" fill="#0EA5A4"/>
  <text x="394" y="368" font-size="20" font-weight="900" fill="#0F172A">約10分</text>
  <text x="260" y="402" font-size="13" fill="#64748B">AIの要約・タスク抽出案を確認・修正するだけ</text>

  <!-- Badge -->
  <circle cx="1000" cy="130" r="76" fill="#0EA5A4"/>
  <text x="1000" y="120" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="700">時間削減</text>
  <text x="1000" y="150" text-anchor="middle" font-size="30" fill="#FFFFFF" font-weight="900">約82%</text>
</svg>
