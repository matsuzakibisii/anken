<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <style>
      .ttl { font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 28px; fill: #0F172A; }
      .sub { font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 16px; fill: #64748B; }
      .card-title { font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 20px; fill: #0F172A; }
      .card-text { font-family: 'Noto Sans JP', sans-serif; font-weight: 400; font-size: 15px; fill: #475569; }
      .num { font-family: 'Noto Sans JP', sans-serif; font-weight: 900; font-size: 22px; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1200" height="480" fill="#F8FAFC"/>

  <text x="60" y="55" class="ttl">依頼前に整理しておきたい3つのポイント</text>
  <text x="60" y="82" class="sub">kintoneカスタマイズをスムーズに依頼するための事前チェック</text>

  <!-- Card 1 -->
  <g transform="translate(60,120)">
    <rect width="340" height="300" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="48" cy="50" r="24" fill="#2563EB"/>
    <text x="48" y="58" text-anchor="middle" class="num">1</text>
    <g transform="translate(28,92)" stroke="#2563EB" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 10 H38"/>
      <path d="M30 2 L40 10 L30 18"/>
      <path d="M2 28 H38"/>
      <path d="M30 20 L40 28 L30 36"/>
    </g>
    <text x="28" y="160" class="card-title">業務フローの整理</text>
    <text x="28" y="190" class="card-text">「誰が」「どの場面で」</text>
    <text x="28" y="212" class="card-text">使うのかを明確にし、</text>
    <text x="28" y="234" class="card-text">想定とのズレを防ぐ。</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(430,120)">
    <rect width="340" height="300" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="48" cy="50" r="24" fill="#FB7185"/>
    <text x="48" y="58" text-anchor="middle" class="num">2</text>
    <g transform="translate(28,88)" stroke="#FB7185" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="20" width="32" height="22" rx="3"/>
      <path d="M14 20 V12 a8 8 0 0 1 16 0 V20"/>
    </g>
    <text x="28" y="160" class="card-title">権限・範囲の整理</text>
    <text x="28" y="190" class="card-text">どのアプリ・どの範囲</text>
    <text x="28" y="212" class="card-text">まで変更してよいかを</text>
    <text x="28" y="234" class="card-text">事前にすり合わせる。</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(800,120)">
    <rect width="340" height="300" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <circle cx="48" cy="50" r="24" fill="#60A5FA"/>
    <text x="48" y="58" text-anchor="middle" class="num">3</text>
    <g transform="translate(26,88)" stroke="#60A5FA" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="20" cy="20" r="9"/>
      <path d="M20 4 V8 M20 32 V36 M4 20 H8 M32 20 H36 M9 9 L12 12 M31 9 L28 12 M9 31 L12 28 M31 31 L28 28"/>
    </g>
    <text x="28" y="160" class="card-title">保守体制の整理</text>
    <text x="28" y="190" class="card-text">改修後の更新・動作</text>
    <text x="28" y="212" class="card-text">確認を誰が担うのかを</text>
    <text x="28" y="234" class="card-text">決めておく。</text>
  </g>
</svg>
